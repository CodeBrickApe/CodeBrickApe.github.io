x" id="switch"/><div class="toggle-wrapper"><div class="sc-wkso3y-1 bquxby"><span class="sc-wkso3y-0 iamDEq"><span class="sc-5mxuof-0 clJVaL"><svg width="2.2rem" height="2.2rem" viewBox="0 0 28 28"><use xlink:href="#night" href="#night"></use></svg></span></span><span class="sc-wkso3y-0 iamDEq"><span class="sc-5mxuof-0 clJVaL"><svg width="2.2rem" height="2.2rem" viewBox="0 0 28 28"><use xlink:href="#day" href="#day"></use></svg></span></span></div><div class="tree-left"><div class="tree"></div><div class="trunk"><div class="branch"></div><div class="branch"></div></div></div><div class="tree-right"><div class="tree-back"><div class="trunk"></div></div><div class="tree-front"><div class="trunk"></div></div></div><div class="moon"></div><div class="stars"><div class="star big-star"><div class="vertical"></div><div class="horizontal"></div></div><div class="star small-star"><div class="vertical"></div><div class="horizontal"></div></div></div><div class="sun"></div><div class="hills"><div class="hill-left"></div><div class="hill-right"></div></div></div></label></div></div><div class="sc-1fgaa7z-0 hVyOOO"></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"postData":[{"id":"article-10","markdown":"## 🕹开发环境\n\n- Next：13.4.7\n- Node: 18.12.0\n\n## 1. GitHub 新建仓库\n\n仓库名有两种设置方式，两种方式都会介绍配置方法，本文主要使用有基础路径的方式\n\n  - 无基础路径，直接访问 （https://CodeBrickApe.github.io）\n 仓库名设置为 ```{gitHub 用户名} ``` + ``` .github.io ```，仓库名比较特殊，必须要是 github.io 为后缀结尾的，比如``` CodeBrickApe.github.io ```。GitHub Pages 允许每个账户创建一个名为 {username}.github.io 的仓库。\n ![](/public/images/gitHubPages+Next/newGithub.png)\n\n - 有基础路径\n仓库名正常设置，访问时需要拼接基础路径 （https://CodeBrickApe.github.io/github-pages-next）\n![](/public/images/gitHubPages+Next/creatNext-path.png)\n\n## 2.创建Next应用\n\n执行创建命令并运行项目\n创建过程中依赖项根据自己日常使用习惯，选择配置\n\n```bash\nnpx create-next-app@latest --typescript github-pages-next\ncd github-pages\npnpm dev\n```\n\n![](/public/images/gitHubPages+Next/creatNext.png)\n\n#### package.json文件\n![](/public/images/gitHubPages+Next/package.png)\n\n#### 修改next.config.js文件\n启用静态导出，请更改 中的 next.config.js 输出模式：\n\n``` js\n/** @type {import('next').NextConfig} */\nconst repo = 'github-pages-next'\n// 用于为静态资源（如图像、样式表、JavaScript 文件等）设置 URL 前缀\n// 这在将应用部署到自定义域名或 CDN 上时特别有用，因为它允许您将静态资源存储在不同的位置\nlet assetPrefix = `/${repo}/`\n\n// 用于为应用设置基础路径\n// 这在将应用部署到子目录下时特别有用，因为它允许您指定应用所在的目录\nlet basePath = `/${repo}`\n\nconst isGithubActions = process.env.GITHUB_ACTIONS || false\n\nif (isGithubActions) {\n  const repo = process.env.GITHUB_REPOSITORY.replace(/.*?\\//, '')\n  assetPrefix = `/${repo}/`\n  basePath = `/${repo}`\n}\n\nconst nextConfig = {\n  images: {\n    unoptimized: true, // 当设置为 true 时，直接提供原始图片，不修改图片质量、 尺寸或格式\n  },\n  basePath,\n  assetPrefix,\n  distDir: 'out',  // 指定用于自定义构建目录的名称\n  output: 'export',  // 运行 next build 后，Next.js 将生成一个 out 文件夹，其中包含应用程序的 HTML/CSS/JS\n}\n\nmodule.exports = nextConfig\n\n```\n\n## 设置 GitHub Actions\n\n配置 GitHub Actions workflow, 以便在 push时自动构建、导出和部署 静态网站到 GitHub Pages\n根目录新建文件 .github/workflows/gh-pages.yml\n\n``` yml\nname: Deploy to GitHub Pages\non:\n  push:\n    branches: [ main ]\n# 执行的一项或多项任务\njobs:\n  build-and-deploy:\n    # 运行在虚拟机环境ubuntu-latest\n    # https://docs.github.com/zh/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idruns-on\n    runs-on: ubuntu-latest\n    steps:\n    - name: 获取源码   ️\n      uses: actions/checkout@v3\n    - name: Node环境版本  ️\n      uses: actions/setup-node@v3\n      with:\n        node-version: 18\n    - name: 安装 Pnpm  \n      uses: pnpm/action-setup@v2\n      id: pnpm-install\n      with:\n          version: 7\n          run_install: true\n    - name: 安装依赖 ⚙️\n      run: pnpm install\n    - name: 打包  ️\n      run: |\n        npm run build\n        touch out/.nojekyll\n    - name: 部署  \n      uses: JamesIves/github-pages-deploy-action@v4\n      with:\n        branch: gh-pages\n        folder: out\n        clean: true\n```\n\n\n\n## 推送代码\n\n```bash\ngit init\ngit add .\ngit commit -m \"init\"\ngit branch -M main\ngit remote add origin git@github.com:AnoyiX/AnoyiX.github.io.git\ngit push -u origin main\n```\n推送成功后，Github Actions 会自动构建，并将生成的静态文件导出到分支 gh-pages，接下来只需设置 Pages 对应的分支即可：\n![](../public/images/gitHubPages+Next/githubSettingPath.png)\n切换分支后，稍微等待几十秒，即可通过域名 https://anoyix.github.io/ 正常访问我们的 NextJS 应用了。\n\n后续只需将代码推送到 main 分支，应用就会自动构建、自动部署。\n\n示例代码\n[GitHub Repository](https://github.com/CodeBrickApe/github-pages-next)\n[GitHub Pages 预览页面](https://codebrickape.github.io/github-pages-next/)\n\n\n## 常见报错\n\n![](../public/images/gitHubPages+Next/githubError.png)\n\n原因分析：\n默认情况下，新存储库没有适当的工作流权限。\n\n解决方案：\n\n1. 转到存储库Setting\n2. 选择Actions\u003e\u003e\u003eGeneral\n3. 在\"工作流权限(Workflow permissions)\"中，选择Read and write permissions\n![](../public/images/gitHubPages+Next/githubSetting.png)","title":"利用GitHub Page-从零配置实现 自动化构建并部署Next.js项目（一）","summary":"可以使用GitHub Pages 来展示一些开源项目、主持博客甚或分享您的简历。 Next.js 是一个用于构建服务器渲染 React 应用的框架，搭配使用Next.js使用GitHub Pages可以定制化展示自己的网站。","tags":["Next","Github Pages","Actions"],"categories":null,"date":"Fri, 07 Jul 2023 10:36:17 GMT","updated":"Fri, 07 Jul 2023 10:36:17 GMT","coverImg":null,"dateYMD":"2023-07-07","wordcount":"本文字数：350 字    阅读完需：约 2 分钟"},{"id":"article-09","markdown":"一、front-matter包含的内容\n参数描述默认值\n\n基础\n\ntitle标题\n\ndate建立日期文件建立日期\n\ntags标签（不适用于分页）\n\ncategories分类（不适用于分页）\n\n进阶\n\nsubtitle\n\nlayout布局\n\nauthor作者名字\n\nupdated更新日期文件更新日期\n\ncomments开启文章的评论功能true\n\npermalink覆盖文章网址\n\nkeywords仅用于 meta 标签和 Open Graph 的关键词（不推荐使用）\n\nsummary自定义的文章摘要内容，如果这个属性有值，文章卡片摘要就显示这段文字，否则程序会自动截取文章的部分内容作为摘要\n\nimg文章的显示的时候的背景\n\ncoverImg\n\ncover: true\n\npassword\n\nmathjax: true\n\ntop:true\n\n二、什么是front-matter\n就是.md文件最上面的这部分内容\n-–\ntitle: tags\ndate: 2019-08-13 09:39:50\ntype: tags\nlayout: tag\n-–\n三、标签详解（只讲解官方文档中说的模糊的）\nlayout：\n作用：指定要使用的模版样式\n例如我上面的例子中使用的tag模版\n如果不指定这个将会使用根目录/_config.yml中的默认配置default_layout: post\ntags：\n作用：给文章添加标签，使其能在标签页中显示\n如何使用：\ntags:\n- PS3\n- Games\n也可以[Github,Git,node.js]\n如上所示一篇文章可以设置多个标签\ncategories：\n整体内容基本与 tags 一致\n区别在于在进行分类管理的时候此标签下的内容是有严格的顺序和层次的，tags没有\ncategories:\n- Diary\n因为hexo的分类具有层次关系，同一文章不能同时存在两个同级分类中，所以下面这种方式\ncategories:\n- Diary\n- Life\n会使分类Life成为Diary的子分类，而不是并列分类。因此，有必要为您的文章选择尽可能准确的分类。\npermalink：\n直白的说就是静态文件的存放地址\n如果不指定这个将会使用根目录/_config.yml中的默认配置permalink: :year/:month/:day/:title/\n如果指定的文件夹不存在就会创建一个\n你如何设置最后在页面中使用的连接地址就会是什么样的，例如上面这种方式最终生成的文章的连接地址就是xxx.github.io/2019/08/11/：title/\nkeywords\n用于SEO优化\n你这篇文章包含哪些关键词\n人家百度这些关键词的时候可能就会显示你的页面","title":"front-matter使用详解","summary":"Front-matter选项详解Front-matter 一般来说都是卸载md文档的最上方的，使用--- 分隔开，用来标识关于文章的一些信息，比如作者，日期等。","tags":null,"categories":null,"date":"Fri, 30 Jun 2023 16:43:17 GMT","updated":"Fri, 30 Jun 2023 16:56:29 GMT","coverImg":null,"dateYMD":"2023-06-30","wordcount":"本文字数：90 字    阅读完需：约 1 分钟"},{"id":"article-08","markdown":"## 介绍\n\n使用模版字符串和 CSS 语法，生成一个样式化组件（StyledComponent），被包裹的自定义组件。\n\n直接绑定组件和样式，免去两者间接对应的关系。\n\n  - 样式和组件强关联，解决痛点：\n    - 难以确定样式在哪些组件中被使用，容易留下已弃用的样式代码\n    - 想要确定组件上的样式内容，需要到样式文件中查找\n  - 动态应用 CSS，解决痛点：\n    - 针对不同状态/不同主题，需要手动编写和管理大量 classes\n    - styled-components 可以动态追踪组件状态插入 styles，结合代码拆分，可以实现加载最少量的代码\n  - 为样式生成唯一的 classname，解决痛点：\n    - classname 重名、覆盖、拼写错误\n  - 自动生成前缀\n\n## 安装\n\n通过npm / yarn安装\n```bash\n// 从 npm 安装 styled-components :\nnpm install --save styled-components\n\n//从 yarn 安装 styled-components :\nyarn add styled-components\n```\n\n## 基本用法\n\n可以直接在项目组件中使用，使用 Es6 的模板字符串语法来书写，如下所示：\n\n``` javascript\nimport styled from 'styled-components';\n\n// 带样式的section\nconst Layout = styled.section`\n  margin: 0 auto;\n  width: 300px;\n  text-align: center;\n`;\n// 带样式的h1\nconst Title = styled.h1`\n  width: 100px;\n  color: white;\n  background: skyblue;\n`;\nrender(\n  \u003cLayout\u003e\n    \u003cTitle\u003eHello World\u003c/Title\u003e\n  \u003c/Layout\u003e\n);\n\n```\n\n## 基于props传递样式\n\n使用 styled-components 来定义组件的主题。\n\n``` javascript\nimport styled from 'styled-components';\n// 根据props是否用primary来设置颜色和背景颜色\n  const Button = styled.button`\n    background: ${props =\u003e props.primary ? 'palevioletred' : 'white'};\n    color: ${props =\u003e props.primary ? 'white' : 'palevioletred'};\n    font-size: 1em;\n    margin: 1em;\n    padding: 0.25em 1em;\n    border: 2px solid palevioletred;\n    border-radius: 3px;\n`;\n  render(\n    \u003cdiv\u003e\n      \u003cButton\u003eNormal\u003c/Button\u003e\n      \u003cButton primary\u003ePrimary\u003c/Button\u003e\n    \u003c/div\u003e\n  );\n```\n\n上述示例中如果primary属性存在，则按钮背景色会变成蓝色，边框消失，并且文字颜色变成白色.\n\n## 样式继承\n常用的组件,在特定场景下可以稍微更改其样式.当然我们可以通过 props 传递插值的方式来实现,但是对于某个只需要重载一次的样式来说这样做的成本还是有点高.\n创建一个继承其它组件样式的新组件,最简单的方式就是用构造函数styled()包裹被继承的组件.下面的示例就是通过继承上一节创建的按钮从而实现一些颜色相关样式的扩展:\n\n``` javascript\n\n// 上一节创建的没有插值的 Button 组件\nconst Button = styled.button`\n  color: palevioletred;\n  font-size: 1em;\n  margin: 1em;\n  padding: 0.25em 1em;\n  border: 2px solid palevioletred;\n  border-radius: 3px;\n`;\n\n// 一个继承 Button 的新组件, 重载了一部分样式\nconst TomatoButton = styled(Button)`\n  color: tomato;\n  border-color: tomato;\n`;\n\nrender(\n  \u003cdiv\u003e\n    \u003cButton\u003eNormal Button\u003c/Button\u003e\n    \u003cTomatoButton\u003eTomato Button\u003c/TomatoButton\u003e\n  \u003c/div\u003e\n);\n\n```","title":"使用styled-components定义组件样式","summary":"使用模版字符串和 CSS 语法，生成一个样式化组件（StyledComponent），被包裹的自定义组件。","tags":["css","css-in-js"],"categories":null,"date":"Fri, 30 Jun 2023 16:51:54 GMT","updated":"Fri, 30 Jun 2023 16:52:41 GMT","coverImg":null,"dateYMD":"2023-06-30","wordcount":"本文字数：170 字    阅读完需：约 1 分钟"},{"id":"article-07","markdown":"## 环境\n\n\u003e node.js 18.0.0\n\u003e npm 8.6.0 \n\n\n## 涉及依赖\n\n- vue@^3.2.25\n- vite@^2.9.9\n- vue-router@4.0.13\n- vuex@4.0.2\n- typescript@^4.5.4\n- less@^4.1.1\n- @vitejs/plugin-vue-jsx@^1.1.5\n- element-plus@^1.0.2-beta.46\n\n## 安装vite脚手架\n\n``` bash\n\nnpm install -g create-vite-app\n# or\nyarn add -g create-vite-app\n\n```\n\n## 创建项目\n\n``` bash\n\nnpm init @vitejs/app\n# or\nyarn create @vitejs/app\n\n```\n\n1. 设置项目名字\n  \n  ![](/public/images/vite+Vue.3+ts/设置名字.png)\n\n2. 选择预设模版，选择vue\n\n  ![](/public/images/vite+Vue.3+ts/选择预设模版.png)\n\n  回车后选择项目语言，这里我们选择vue - ts\n\n  ![](/public/images/vite+Vue.3+ts/项目语言.png)\n\n3. 安装完成，进入项目，安装依赖，运行项目\n  \n``` bash\n  // 进入项目\n  cd vite-project\n\n  // 安装依赖\n  npm install\n\n  // 运行项目\n  npm run dev\n\n```\n\n   ![](/public/images/vite+Vue.3+ts/安装完成.png)\n\n4. Vite + Vue3 + TypeScript 简单的项目骨架搭建完毕，打开后样式如下：\n\n  ![](/public/images/vite+Vue.3+ts/项目目录.png)\n  ![](/public/images/vite+Vue.3+ts/初始页面.png)\n\n## 规范目录结构\n\n对vite脚手架构建项目的目录结构进行补充，根据日常开发习惯，创建对应的文件夹。\n\n```\n\n├── dist/\n└── src/\n    ├── api\n    │   └── ... // 抽取出API请求\n    ├── assets/                    // 静态资源目录\n    ├── common/                    // 通用类库目录\n    ├── components/                // 公共组件目录\n    ├── router/                    // 路由配置目录\n    ├── store/                     // 状态管理目录\n        ├── index.ts          // 我们组装模块并导出 store 的地方\n        ├── getters.ts        // 根级别的 getters\n        ├── actions.ts        // 根级别的 action\n        ├── mutations.ts      // 根级别的 mutation\n        └── modules\n            ├── home.ts       // 模块\n            └── login.ts       // 模块\n    ├── style/                     // 通用 CSS 目录\n    ├── utils/                     // 工具函数目录\n    ├── views/                     // 页面组件目录\n    ├── App.vue\n    ├── main.ts\n    ├── shims-vue.d.ts\n├── tests/                         // 单元测试目录\n├── index.html\n├── tsconfig.json                  // TypeScript 配置文件\n├── vite.config.ts                 // Vite 配置文件\n└── package.json\n\n```\n\n## 配置路径别名\n\nVite 配置文件 vite.config.ts 位于根目录下，项目启动时会自动读取。\n\n简单配置如：设置 @ 指向 src 目录、 服务启动端口、打包路径、代理等。\n\n此时具体配置如下：\n\n``` typescript\n\nimport { resolve } from \"path\"; // 此处如果报错则安装 node/path依赖\nimport { defineConfig } from \"vite\";\nimport vue from \"@vitejs/plugin-vue\";\n\nexport default defineConfig({\n  plugins: [vue()],\n  server: {\n    port: 8082, // 设置服务启动端口号\n    open: true, // 设置服务启动时是否自动打开浏览器\n    cors: true // 允许跨域\n    // 设置代理，根据我们项目实际情况配置\n    // proxy: {\n    //   '/api': {\n    //     target: 'http://xxx.xxx.xxx.xxx:8000',\n    //     changeOrigin: true,\n    //     secure: false,\n    //     rewrite: (path) =\u003e path.replace('/api/', '/')\n    //   }\n    // }\n  },\n  resolve: {\n    alias: {\n      \"@\": resolve(__dirname, \"/src\"), // 设置 `@` 指向 `src` 目录\n    },\n  },\n});\n\n\n```\n\n## 配置路由 Router\n\n**安装vue-router**\n\n``` bash \n\nnpm i vue-router@next\n\n```\n\n1. 在 src 目录下新建 views/home.vue 、 views/login.vue 、views/404.vue\n\n  例如：\n\n  home.vue\n\n``` javascript\n\n\u003ctemplate\u003e 这是home.vue \u003c/template\u003e\n\n```\n\n2. 在 src 目录下新建 router/index.ts\n\n\n\n``` typescript\n\nimport { createRouter, createWebHashHistory, RouteRecordRaw } from \"vue-router\";\n\n// 路由配置 和以前一样\nconst routes: RouteRecordRaw[] = [\n  {\n    path: \"/\",\n    redirect: \"/login\",\n  },\n  {\n    path: \"/home\",\n    name: \"home\",\n    meta: {\n      type: \"home\",\n    },\n    component: () =\u003e import(\"@/views/home.vue\"),\n  },\n  {\n    path: \"/login\",\n    name: \"login\",\n    meta: {\n      type: \"login\",\n    },\n    component: () =\u003e import(\"@/views/login.vue\"),\n  },\n  {\n    path: \"/:pathMatch(.*)*\", // 注意此处 404页面匹配规则和以前不相同，得采用这种配置方式才行\n    name: \"404\",\n    component: () =\u003e import(\"@/views/404.vue\"),\n  },\n];\n\n// 此处由【new VueRouter】的方式修改为【createRouter】的方式 其余无变化\nconst router = createRouter({\n  history: createWebHashHistory(), //路由模式的配置采用API调用的方式 不再是之前的字符串 此处采用的hash路由\n  routes,\n});\n\nexport default router;\n\n```\n\n3. 在main.ts这个入口文件中插件的方式通过vue引入就可以了\n\n``` javascript\nimport App from './App'\nimport router from \"@/router\"\nimport { createApp } from 'vue'\n\ncreateApp(App).use(router).mount(\"#app\");\n\n```\n\n## 状态管理工具 Vuex\n\n**安装 vuex**\n\n\n\n``` bash \n\nnpm i vuex@next\n\n```\n\nvue3中的vuex配置和vue2基本上相同，这里就直接采用模块化的方式创建作为演示了。\n\n1. 首先配置主入口，src目录下创建 store/index.ts 文件\n\nVite 批量引入文件，[Vite Glob](https://vitejs.cn/guide/features.html#glob-import) 导入，import.meta.glob、import.meta.globEager，可以避免每新增模块的时候我们都要去配置文件里面做一次重复操作。\n\n\n\n``` javascript\n\nimport { createStore } from 'vuex'\n\nimport getters from './getters'\nimport mutations from './mutations'\nimport actions from './actions'\n\nconst state={}\n\nlet modules = {}\n// Vite 支持 Glob 导入 https://vitejs.cn/guide/features.html#glob-%E5%AF%BC%E5%85%A5\n// 导入 modules 下面的 所有 .ts文件\nconst modulesFiles = import.meta.globEager(\"./modules/*.ts\")\nfor (const path in modulesFiles) {\n        const moduleName = path.replace(/(.*\\/)*([^.]+).*/gi, '$2')\n        modules = { ...modules, [moduleName]: modulesFiles[path].default }\n}\n\nexport default createStore({\n        state,\n        getters,\n        mutations,\n        actions,\n        modules\n})\n\n```\n\n2. 此处仅做 login 这个模块仓库做相关代码的演示,src目录下创建 store/modules/login.ts 文件\n\n``` javascript\n\nimport { Module } from \"vuex\";\n\nexport type IUser = Record\u003c\"name\" | \"password\", string\u003e;\n\nexport interface ILoginState {\n  user: IUser;\n}\n\n// Module这个类型可以传两个范型变量 第一个是当前模块state的对象接口类型 第二个是主仓库state的对象接口类型 \nconst LoginStore: Module\u003cILoginState, {}\u003e = {\n  namespaced: true,\n  state: {\n    user: {\n      name: \"\",\n      password: \"\",\n    },\n  },\n  getters: {},\n  mutations: {\n    SET_USER(state, payload: IUser) {\n      state.user = payload;\n    },\n  },\n  actions: {\n    setUser({ commit }, payload: IUser) {\n      commit(SET_USER, payload);\n    },\n  },\n};\n\nexport default LoginStore;\n\n```\n\n3. 在main.ts文件中挂载 Vuex 配置\n\n``` javascript\n\nimport App from './App'\nimport store from \"@/store\"\nimport router from \"@/router\"\nimport { createApp } from 'vue'\n\ncreateApp(App).use(router).use(store).mount(\"#app\");\n\n```","title":"配置vite + Vue3.0 + ts","summary":"架构一个Vite + typescript + vue3生态链项目","tags":["vue","vite"],"categories":null,"date":"Fri, 30 Jun 2023 16:51:11 GMT","updated":"Fri, 30 Jun 2023 16:51:44 GMT","coverImg":null,"dateYMD":"2023-06-30","wordcount":"本文字数：550 字    阅读完需：约 3 分钟"},{"id":"article-06","markdown":"## 问题\n\nnew Date()方法，其他浏览器都能接受各种时间格式数据如：yyyy-MM-dd hh:mm:ss，[safari](https://so.csdn.net/so/search?q=safari\u0026spm=1001.2101.3001.7020)浏览器接受的时间如果是小时时间，那前面的年月日只能用/隔开(yyyy/MM/dd hh:mm:ss)，否则计算的为无效数据 ，显示：`Invalid Date`。\n\n## 解决\n\n在new Date(‘yyyy-MM-dd HH:mm:ss’)格式化前需要先把[字符串](https://so.csdn.net/so/search?q=字符串\u0026spm=1001.2101.3001.7020)转化为Safari支持的格式，可以是yyyy/MM/dd HH:mm:ss或yyyy-MM-ddTHH:mm:ss或其他\n\n1. 改变时间格式\n\n```javascript\nnew Date('2018-11-11 00:00:00'.replace(/-/g, \"/\"))\nnew Date('2018-11-11 00:00:00'.replace(/ /g,\"T\"))\n```\n\n- 注：由于IE8上根本不支持`-`分割的日期，所以这里建议用`/`分割日期字符串，你也可以不考虑IE8\n\n2. 改变Date原型链方法\n\n- 在vue或者react项目中\n\n```javascript\n// 重写Date对象\n// 如果是vue或者react项目  在入口文件处写下方代码\nwindow.OldDate = window.Date\nvar bind = Function.bind\nvar unbind = bind.bind(bind)\nfunction instantiate (constructor, args) {\n  return new (unbind(constructor, null).apply(null, args))()\n}\n\nwindow.Date = (function (Date) {\n  Object.setPrototypeOf(MyDate, Date)\n  MyDate.prototype = Date.prototype\n  return MyDate\n  function MyDate () {\n    let arg = arguments[0]\n    if (Object.prototype.toString.call(arg) === '[object String]') {\n      arguments[0] = arg = arg.replace(/-/g, '/')\n      arguments[0] = arg.replace(/T/, ' ')\n      console.log(arguments[0])\n    }\n    return instantiate(Date, arguments)\n  }\n}(window.OldDate))\n```\n\n- 在其他项目中\n\n这段代码应该放在所有new Date操作之前去执行，如html的`\u003chead\u003e`中\n\n```javascript\n/**\n     * 在Safari和IE8上执行 new Date('2017-12-8 11:36:45'); 会得到Invalid Date\n     * 本函数重写默认的Date函数，以解决其在Safari，IE8上的bug\n     */\n    Date = function (Date) {\n      MyDate.prototype = Date.prototype;\n      return MyDate;\n\n      function MyDate() {\n        // 当只有一个参数并且参数类型是字符串时，把字符串中的-替换为/\n        if (arguments.length === 1) {\n          let arg = arguments[0];\n          if (Object.prototype.toString.call(arg) === '[object String]' \u0026\u0026 arg.indexOf('T') === -1) {\n            arguments[0] = arg.replace(/-/g, \"/\");\n            // console.log(arguments[0]);\n          }\n        }\n        let bind = Function.bind;\n        let unbind = bind.bind(bind);\n        return new (unbind(Date, null).apply(null, arguments));\n      }\n    }(Date);\n```\n\n","title":"safrai兼容Date","summary":"new Date()方法，safari浏览器接受的时间格式","tags":["safrai","Date"],"categories":null,"date":"Fri, 30 Jun 2023 16:50:30 GMT","updated":"Fri, 30 Jun 2023 16:51:01 GMT","coverImg":null,"dateYMD":"2023-06-30","wordcount":"本文字数：250 字    阅读完需：约 2 分钟"},{"id":"article-05","markdown":"[Next.js](https://www.nextjs.cn/docs/getting-started) 是一个开源且易于使用的开发框架。Next.js 是一个 React 开发框架。这意味着 Next.js 基于 React 并提供了部署 React 应用程序所需的所有核心功能。一些常用的功能是服务器端渲染 (SSR)、预渲染、静态站点生成 (SSG)、webpack 支持、页面路由等。\n\n\n\nNext.js 是 React 服务端渲染应用框架. 用于构建 SEO 友好的 SPA 应用.\n\n1. 支持两种预渲染方式, 静态生成（SSG）和服务器端渲染（SSR）.\n2. 基于页面的路由系统, 路由零配置\n3. 自动代码拆分（code splitting）. 优化页面加载速度.\n4. 支持静态导出, 可将应用导出为静态网站.\n5. 内置 CSS-in-JS 库 styled-jsx\n6. 方案成熟, 可用于生产环境, 世界许多公司都在使用\n7. 应用部署简单, 拥有专属部署环境 Vercel, 也可以部署在其他环境\n\n# 创建Next.js项目\n\n**🕹系统环境**\n\n- Node.js： v18.0.0\n- react：18.0.0\n- Next.js：12.1.5（[Node.js 12.22.0](https://nodejs.org/) 或更高版本）\n\n### 手动创建  自己配置\n\n1. 命令行创建文件夹并初始化\n\n```Bash\nMkdir NextDemo\n\ncd NextDemo\n\nnpm init\n```\n\n1. 安装项目依赖\n\n```Bash\nnpm install --save react react-dome next\n```\n\n 安装完成后`package.json`\n\n```JSON\n{\n  \"name\": \"nextdemo\",\n  \"version\": \"1.0.0\",\n  \"description\": \"\",\n  \"main\": \"index.js\",\n  \"scripts\": {\n    \"test\": \"echo \\\"Error: no test specified\\\" \u0026\u0026 exit 1\",\n  },\n  \"author\": \"\",\n  \"license\": \"ISC\",\n  \"dependencies\": {\n    \"next\": \"^12.1.5\",\n    \"react\": \"^18.0.0\",\n    \"react-dom\": \"^18.0.0\"\n  }\n}\n```\n\n1. 增加快捷命令\n\n```JSON\n\"scripts\": {\n    \"test\": \"echo \\\"Error: no test specified\\\" \u0026\u0026 exit 1\",\n    \"dev\" : \"next\" ,\n    \"build\" : \" next build\",\n    \"start\" : \"next start\"\n},\n```\n\n1. 创建pages文件夹和文件\n\n-  在 Next.js 中，页面是被放置在 `pages` 文件夹中的 React 组件\n- 组件需要被默认导出\n- 组件文件中不需要引入 React\n- 页面地址与文件地址是对应关系\n\n```jsx\nfunction Index(){\n  return(\n    \u003cdiv\u003eHello Next.js\u003c/div\u003e\n  )\n}\nexport default Index\n```\n\n写好后在终端中使用 `npm run dev`来打开预览，在浏览器中可以看到输出了正确的结果。\n\n![img](/public/images/next/file.png)\n\n### creact-next-app 快速创建Next.js项目\n\n`create-next-app`可以快速的创建Next.js项目，它就是一个脚手架，有了它只要一句命令就可以把项目需要的依赖包和基本目录都生成，日常开发中基本不用手动的形式自己创建，全部使用create-next-app来创建。\n\n\n\n安装`create-next-app`，使用脚手架前，需要先进行全局安装。\n\n```Bash\nnpm install -g create-next-app\n```\n\n目前可以支持三种方式的创建，分别是用`npx`,`yarn`和`create-next-app`命令来进行安装，安装的结构都是完全一样的，本次采用的是npx的形式。\n\n\n\nnpx 是Node自带的npm模块，所以你只要安装了Node都是可以直接使用npx命令的。\n\n但低版本的Node是不带这个命令的，所以你需要手都安装一下。\n\n```Bash\nnpm install -g npx\n```\n\n\n\n打开命令提示符工具，然后直接用下面的npx命令创建项目。\n\n```Bash\nnpx create-next-app react-dome\n```\n\n如果希望使用 TypeScript 开发项目，可以通过 `--typescript` 参数创建 TypeScript 项目：\n\n```Bash\nnpx create-next-app react-dome --typescript\n```\n\n安装完成后：\n\n- 运行 `npm run dev` 或 `yarn dev` 来启动开发服务器，访问地址为 `http://localhost:3000`。\n- 通过 `http://localhost:3000` 地址访问你的应用程序。\n- 编辑 `pages/index.js` 文件并在浏览器中查看更新。\n\n\n\n### Next.js项目结构介绍\n\n![img](/public/images/next/目录.png)\n\ncomponents文件夹:这里是专门放置自己写的组件的，这里的组件不包括页面，指公用的或者有专门用途的组件。（手动创建）\n\nnode_modules文件夹：Next项目的所有依赖包都在这里，一般我们不会修改和编辑这里的内容。\n\npages文件夹：这里是放置页面的，这里边的内容会自动生成路由，并在服务器端渲染，渲染好后进行数据同步。\n\npublic文件夹： 这个是静态文件夹，比如项目需要的图片、图标和静态资源都可以放到这里。\n\n.gitignore文件： 这个主要是控制git提交和上传文件的，简称就是忽略提交。\n\nstyles文件夹：存放样式文件\n\nnext.config.js：对于 Next.js 的自定义高级配置\n\npackage.json文件：定义了项目所需要的文件和项目的配置信息（名称、版本和许可证），最主要的是使用npm install 就可以下载项目所需要的所有包。\n\n# 路由\n\nNext.js 有一个基于文件系统的路由器，它建立在pages 的概念之上。\n\n将文件添加到`pages`目录时，它会自动作为路由使用。\n\n目录中的文件`pages`可用于定义最常见的模式。\n\n### 一、Next.js 中基于文件的路由架构\n\n```Bash\nreact-dome\n└── pages\n    └── api // API routes\n    ├── _app.js // custom route (will **not** be used as a route)\n    ├── index.js // index route (will be rendered at my-site.com)\n    ├── about.js // predefined route (will be rendered at my-site.com/about)\n    ├── contact.js // predefined route (will be rendered at my-site.com/contact)\n    └── blog\n        ├── index.js // index route for blog (will be rendered at my-site.com/blog) \n        ├── author.js // predefined route (will be rendered at my-site.com/blog/author)\n        ├── [blog-id].js // handles dynamic route (will render dynamcially, based on the url parameter)\n        └── [...slug].js // handles catch all route (will be rendered at all routes following my-site.com/blog)\n```\n\n#### 保证pages目录的干净\n\n对于现在的组件化开发，我们通常会有两种组件，一种作为某个**独立功能的小组件**，一种是作为页面显示的**页面组件**（通常结合了多个小组件），Nexjs同样适用， 但小组件不能存储在pages目录下，这会导致路由系统混乱。我们可以新建一个components目录（根据自己喜好自定义名字）来存储小组件，在需要时从该目录下import使用即可。\n\n多级路由：\n\n如果路由有多级，直接在pages下创立父级目录，再把最终路由文件放入目录下即可实现多级路由。如在pages目录下创建user目录，user下再创建index.js和home.js，那么路由/user就对应index.js文件，/user/home就对应home.js文件\n\n#### 自定义页面\n\n_app.js页面文件夹中的页面。此页面是自定义页面。Next.js不将自定义页面用作路由，它们的前缀是下划线 ( _)。Next.js 使用_app.js来初始化网页。该组件初始化应用程序并传递pagePropsprop，这是我们网站中所有嵌套组件所需的数据。\n\n作为根组件，可以定义一个我们想要在所有页面中持久化的布局。\n\n```jsx\n//pages/_app.js\nimport Layout from '../components/Layout'\nimport '../styles/globals.css'\n\nfunction MyApp({ Component, pageProps }) {\n  return (\n    \u003cLayout\u003e\n      \u003cComponent {...pageProps} /\u003e\n    \u003c/Layout\u003e\n  ); \n}\nexport default MyApp\n```\n\n#### **索引路线**\n\n路由器将自动将命名的文件路由`index`到目录的根目录。\n\n- `pages/index.js`→`/`\n- `pages/blog/index.js`→`/blog`\n\n#### 静态路由\n\n一些路由呈现**静态数据**：它们不使用 URL 中的查询参数来呈现数据。\n\n将创建的两个静态路由是about.js和contact.js。这些文件将分别用于/about和/contact路由。\n\n#### **嵌套路由**\n\n路由器支持嵌套文件。如果创建嵌套文件夹结构，文件将自动以相同的方式路由。\n\n- `pages/blog/author.js`→`/blog/author`\n\n#### **动态路由**\n\n在 Next.js 中，**动态路由**是动态呈现内容的特殊路由，具体取决于id来自 URL 的查询。\n\n[param].js动态路由由使用约定定义的特殊文件处理。param从查询对象中获取。\n\n要匹配动态段，可以使用括号语法。这允许匹配命名参数。\n\n- `pages/blog/[blogId].js`→ `/blog/:blogId`( `/blog/1`)\n\n```jsx\nimport { useRouter } from 'next/router'\n\nconst Blog = () =\u003e {\n  const router = useRouter()\n  const { blogId} = router.query\n  return \u003cp\u003eBlog : {blogId}\u003c/p\u003e\n}\nexport default Blog\n```\n\n路由`/post/abc`将具有以下`query`对象：\n\n```JSON\n{ \"blogId\": \"abc\" }\n```\n\n路由`/post/abc?foo=bar`将具有以下`query`对象：\n\n```JSON\n{ \"foo\": \"bar\", \"blogId\": \"abc\" }\n```\n\n\n\n- `pages/post/[...slug].js匹配/post/a, 但也/post/a/b,/post/a/b/c等等。`\n\n通过展开运算符，可以将动态路由扩展到捕捉所有路径\n\n```JSON\n{ \"slug\": [\"a\"] }\n\n{ \"slug\": [\"a\", \"b\"] }\n```\n\n### 二、跳转页面\n\nNextjs官方推荐了两种跳转方式，一种是`Link`组件包裹，一种使用`Router`，我个人是不推荐`Link`的，原理也是用`Router`实现的，使用也简单，但用起来总感觉很冗余。\n\n#### 标签式导航\n\n`\u003cLink\u003e`组件用于在 Next 应用程序中实现页面转换。这个组件最大的特点是它允许你将查询参数传递给useRouter，这是你用来在动态路由上呈现内容的东西。\n\n```jsx\nimport Link from 'next/link'\n\nfunction Home() {\n  return (\n    \u003cul\u003e\n      \u003cli\u003e\n        \u003cLink href=\"/\"\u003e\n          \u003ca\u003eHome\u003c/a\u003e\n        \u003c/Link\u003e\n      \u003c/li\u003e\n      \u003cli\u003e\n        \u003cLink href=\"/about\"\u003e\n          \u003ca\u003eAbout Us\u003c/a\u003e\n        \u003c/Link\u003e\n      \u003c/li\u003e \n      \u003cli\u003e\n        \u003cLink href=\"/blog/author\"\u003e\n          \u003ca\u003eBlog Post\u003c/a\u003e\n        \u003c/Link\u003e\n      \u003c/li\u003e \n      \u003cli\u003e\n        \u003cLink href=\"/blog/1\"\u003e\n          \u003ca\u003eBlog Info\u003c/a\u003e\n        \u003c/Link\u003e\n      \u003c/li\u003e \n      {posts.map((post) =\u003e (\n        \u003cli key={post.id}\u003e\n          \u003cLink\n            href={{\n              pathname: '/blog/[slug]',\n              query: { slug: post.slug },\n            }}\n          \u003e\n            \u003ca\u003e{post.title}\u003c/a\u003e\n          \u003c/Link\u003e\n        \u003c/li\u003e\n      ))}\n    \u003c/ul\u003e\n  )\n}\n\nexport default Home\n```\n\n#### Router模块进行跳转\n\nNextjs提供了一个**'next/router'**的包，专门用来处理路由。Router便是其中一个对象，使用前引入`Router`，`Router.push('url')`进行跳转。\n\n```jsx\n// pages/index.js\nimport Router from 'next/router'\n\nconst Home = () =\u003e {\n  function gotoA() {\n    // Router.push('/blog/kaiA')\n    Router.push({\n      pathname: '/blog/kaiA',\n      query: {\n        name:'kaiA',\n        id: '666'\n      }\n    })\n  }\n  return (\n      \u003cdiv\u003e\n          \u003cbutton onClick={gotoA}\u003e去kaiA页面\u003c/button\u003e\n      \u003c/div\u003e\n  )\n}\n\nexport default Home\n```\n\n### 三、传递和接收参数\n\n项目开发中一般都不是简单的静态跳转，而是需要动态跳转的。动态跳转就是跳转时需要带一个参数或几个参数过去，然后在到达的页面接受这个传递的参数，并根据参数不同显示不同的内容。比如新闻列表，然后点击一个要看的新闻就会跳转到具体内容。这些类似这样的需求都都是通过传递参数实现的。\n\n在Next.js中只能通过通过query（?id=1）来传递参数，而不能通过(path:id)的形式传递参数\n\n```jsx\nimport { withRouter } from 'next/router';\nimport Link from 'next/link';\n\nconst kaiA = ({ router }) =\u003e {\n  return (\n    \u003c\u003e\n      \u003cdiv\u003e这是{router.query.name}页面 \u003c/div\u003e\n      \u003cLink href='/'\u003e\u003ca\u003e返回首页\u003c/a\u003e\u003c/Link\u003e\n    \u003c/\u003e\n  )\n}\n\nexport default withRouter(kaiA)\n```\n\nNext框架的路由跳转时带参数时，此处使用`withRouter`进行接收，也可以使用`useRouter `进行接受。\n\n### 四、路由钩子\n\nNext 版本11之前支持直接使用`router.events`监听，以下为相应代码：\n\n```jsx\nimport Link from 'next/link'\nimport Router  from 'next/router'\n\nfunction HomePage() {\n  function toA() {\n    Router.push({\n      pathname: '/a',\n      query: {\n        id: 3\n      }\n    })\n  }\n  Router.events.on('routeChangeStart',(...args)=\u003e{\n    console.log('1.routeChangeStart-\u003e路由开始变化,参数为:',...args)\n  })\n  Router.events.on('routeChangeComplete',(...args)=\u003e{\n    console.log('2.routeChangeComplete-\u003e路由结束变化,参数为:',...args)\n  })\n  Router.events.on('beforeHistoryChange',(...args)=\u003e{\n    console.log('3,beforeHistoryChange-\u003e在改变浏览器 history之前触发,参数为:',...args)\n  })\n  Router.events.on('routeChangeError',(...args)=\u003e{\n    console.log('4,routeChangeError-\u003e跳转发生错误,参数为:',...args)\n  })\n  Router.events.on('hashChangeStart',(...args)=\u003e{\n    console.log('5,hashChangeStart-\u003ehash跳转开始时执行,参数为:',...args)\n  })\n  Router.events.on('hashChangeComplete',(...args)=\u003e{\n    console.log('6,hashChangeComplete-\u003ehash跳转完成时,参数为:',...args)\n  })\n  return (\n    \u003c\u003e\n      \u003cLink href='/a?id=2' title='a'\u003e\n        \u003cButton\u003eWelcome to Next.js!\u003c/Button\u003e\n      \u003c/Link\u003e\n      \u003cButton onClick={toA}\u003e跳转去a\u003c/Button\u003e\n    \u003c/\u003e\n  )\n  }\n  \n  export default HomePage\n```\n\nNext 11之后预渲染期间不再支持`router.events`直接监听，需要通过`useEffect`访问\n\n```jsx\nimport Link from 'next/link'\nimport Router  from 'next/router'\n\nfunction HomePage() {\n  function toA() {\n    Router.push({\n      pathname: '/a',\n      query: {\n        id: 3\n      }\n    })\n  }\n  useEffect(() =\u003e {\n    const handleRouteChange = (url, { shallow }) =\u003e {\n      console.log(\n        `App is changing to ${url} ${shallow ? 'with' : 'without'} shallow routing`\n      )\n    }\n    // 路由开始变化\n    router.events.on('routeChangeStart', handleRouteChange)\n    // 路由结束变化\n    router.events.on('routeChangeComplete', handleRouteChange)\n    // \u003e在改变浏览器 history之前触发\n    router.events.on('beforeHistoryChange', handleRouteChange)\n    // 跳转发生错误\n    router.events.on('routeChangeError', handleRouteChange)\n    // hash跳转开始时执行\n    router.events.on('hashChangeStart', handleRouteChange)\n    // hash跳转完成时\n    router.events.on('hashChangeComplete', handleRouteChange)\n    return () =\u003e {\n      //如果组件已卸载，取消订阅\n      //使用' off '方法处理事件:\n      router.events.off('routeChangeStart', handleRouteChange)\n      router.events.off('routeChangeComplete', handleRouteChange)\n      router.events.off('beforeHistoryChange', handleRouteChange)\n      router.events.off('routeChangeError', handleRouteChange)\n      router.events.off('hashChangeStart', handleRouteChange)\n      router.events.off('hashChangeComplete', handleRouteChange)\n    }\n  }, [router])\n\n  return (\n    \u003c\u003e\n      \u003cLink href='/a?id=2' title='a'\u003e\n        \u003cButton\u003eWelcome to Next.js!\u003c/Button\u003e\n      \u003c/Link\u003e\n      \u003cButton onClick={toA}\u003e跳转去a\u003c/Button\u003e\n    \u003c/\u003e\n  )\n  }\n\n  export default HomePage\n\n  \n```\n\n# API路由\n\n### **什么是 API Routes**\n\n- API Routes 可以理解为接口，客户端向服务器端发送请求获取数据的接口\n- Next.js 应用允许 React 开发者编写服务器端代码创建数据接口\n- API 路由为使用 Next.js 构建自己的 API 提供了一种简单的解决方案，接触过mock的应该很好理解，就把它当做mock来用就好；\n\n### **如何实现 API Routes**\n\n- 在 pages/api 文件夹中创建 API Routes 文件，比如 user.js\n- `pages/api 目录下的任何文件都将作为 API 端点映射到 /api/*`\n- 例如请求接口 `/api/user` next就会去pages/api文件夹下找到 `user.js / ts` 文件\n\n```JavaScript\nexport default (req, res) =\u003e {\n  res.statusCode = 200\n  res.setHeader('Content-Type', 'application/json')\n  res.end(JSON.stringify({ name: 'John Doe' })) // 接口会返回这条数据\n}\n```\n\n要处理 API 路由的不同 HTTP 方法，可以在请求处理器中使用 `req.method`，如下所示：\n\n```JavaScript\nexport default function handler(req, res) {\n  if (req.method === 'POST') {\n    // Process a POST request\n  } else {\n    // Handle any other HTTP method\n  }\n}\n```\n\n### 访问 API Routes：\n\nlocalhost://3000/api/user\n\n不要在 getStaticPaths 或 getStaticProps 函数中访问 API Routes，因为这两个函数就是在服务器端运行的，可以直接写服务器端代码\n\n# 页面SSR 钩子以及SSG\n\nNext.js 具有两种形式的预渲染： **静态生成（Static Generation）** 和 **服务器端渲染（Server-side Rendering）**。这两种方式的不同之处在于为 page（页面）生成 HTML 页面的 **时机** 。\n\n- **[静态生成 （推荐）](https://www.nextjs.cn/docs/basic-features/pages#static-generation-recommended)**：HTML 在 **构建时** 生成，并在每次页面请求（request）时重用。\n- **[服务器端渲染](https://www.nextjs.cn/docs/basic-features/pages#server-side-rendering)**：在 **每次页面请求（request）时** 重新生成 HTML。\n\n### 获取数据的方式\n\ngetInitialProps在最新版本建议不使用\n\n| 获取数据方法       | 静态化 | 异步 | 只能在pages文件夹下 | 作用         | 服务端请求                 |\n| ------------------ | ------ | ---- | ------------------- | ------------ | -------------------------- |\n| getStaticProps     | 是     | 是   | 是                  | 请求数据     | 是http（非XMLHttpRequest） |\n| getStaticPaths     | 是     | 是   | 是                  | 生成动态路由 | 是                         |\n| getServerSideProps | 否     | 是   | 是                  | 请求数据     | 是                         |\n\n#### getServerSideProps（SSR）每次访问时请求数据\n\n页面中`export`一个`async`的`getServerSideProps`方法，next就会在每次请求时候在服务端调用这个方法。\n\n- 方法只会在服务端运行，每次请求都运行一边`getServerSideProps`方法\n- 如果页面通过浏览器端`Link`组件导航而来，Next会向服务端发一个请求，然后在服务端运\n- `getServerSideProps`方法，然后返回JSON到浏览器。\n\n\n\ngetServerSideProps**方法主要是升级了9.3之前的**`getInitialProps`**方法**\n\n\n\n9.3之前的`getInitialProps`方法有一个很大的缺陷是在浏览器中`req`和`res`对象会是`undefined`。也就是使用它的页面，如果是浏览器渲染你需要在组件内再显示地请求一次。开发体验不太好。 如果没有特殊问题，建议使用`getServerSideProps`替代`getInitialProps`方法。\n\n```tsx\nimport { GetServerSideProps, NextPage } from 'next'\n\ninterface PostProps {\n  list: Post[]\n}\n\nconst App: NextPage\u003cPostProps\u003e = props =\u003e {\n  return \u003cdiv\u003e\u003c/div\u003e\n}\n\nexport const getServerSideProps: GetServerSideProps\u003cPostProps\u003e = async context =\u003e {\n  const list = await context.req.service.post.getPost(context.params.postID)\n  return {\n    props: {\n      list\n    }\n  }\n}\n\nexport default App\n```\n\n#### getStaticProps和getStaticPaths（SSG）构建时请求数据\n\n所谓的SSG也就是静态站点生成，是在build阶段将页面构建成静态的html文件，这样线上直接访问HTML文件，性能极高。\n\nNext.js 在9.0的时候引入了自动静态优化的功能，也就是如果页面没有使用`getServerSideProps`和`getInitialProps`方法，Next在build阶段会生成html，以此来提升性能。\n\n但是正如上文说的，一般应用页面都会需要动态的内容，因此自动静态优化局限性很大。\n\nNext 在9.3中更近了一步，引入了`getStaticProps`和`getStaticPaths`方法来让开发者指定哪些页面可以做SSG优化。\n\n- 使用`getStaticProps`方法在build阶段返回页面所需的数据。\n- 如果是动态路由的页面，使用`getStaticPaths`方法来返回所有的路由参数，以及是否需要回落机制。\n\n```tsx\nexport async function getStaticPaths() {\n  // Call an external API endpoint to get posts\n  const res = await fetch('https://.../posts')\n  const posts = await res.json()\n  // Get the paths we want to pre-render based on posts\n  const paths = posts.map(post =\u003e ({\n    params: { id: post.id },\n  }))\n  // We'll pre-render only these paths at build time.\n  // { fallback: false } means other routes should 404.\n  return { paths, fallback: true };\n}\nexport const getStaticProps: GetStaticProps\u003cInitProps\u003e = async ({ params }) =\u003e {\n  const data = await fetch(\n    `http://.../api/p/${params.bookUUID }/${params.postUUID }`\n  );\n\n  return {\n    props: {\n      post: data,\n    },\n  };\n};\n```\n\n使用非常的简单，需要注意的是：\n\n1. `getStaticPaths`方法返回的`fallback`很有用：如果`fallback`是`false`，访问该方法没有返回的路由会404\n2. 但是如果不想活着不方便在build阶段拿到路由参数，可以设置`fallback`为`true`，Next在访问build中没有的动态路由时候，先浏览器loading，然后服务端开始build该页面的信息，然后再返回浏览器渲染，再次访问该路由该缓存就会生效，很强大！！\n3. **静态缓存目前没办法很灵活的更新！！**，例如博客内容在build或者fallback生效之后发生更改，目前没办法很方便的替换缓存。\n\n### 如何选择SSR还是SSG？\n\n1. 如果页面内容真动态(例如，来源数据库，且经常变化)， 使用`getServerSideProps`方法的SSR。\n2. 如果是静态页面或者伪动态(例如，来源数据库，但是不变化)，可以酌情使用SSG。\n\n# NextJs 请求数据（fetch axios）\n\n### 一、fetch \n\n官方推荐的是fetch 注意 fetch中的路径应是完整的路径\n\n```JavaScript\nfunction About({ data }) {\n    console.log(data) //在这里打印的可在控制台输出\n    return (\n        \u003cdiv\u003e\n            {\n                data.map( item =\u003e (\n                    \u003cli key={item.id}\u003e{item.title}\u003c/li\u003e\n                ))\n            }\n        \u003c/div\u003e\n    )\n}\n\nexport const getStaticProps = async () =\u003e {\n    let result = await fetch('http://apitest.dianzhijia.com/api/open/article?page=1',{\n        headers: {\n            Accept: 'application/vnd.dpexpo.v1+json' //设置请求头\n        },\n        method: 'get',\n    })\n\n    let res = await result.json() //必须通过此方法才可返回数据\n    const {data: {data}} = res\n    return {\n        props: {\n            data //props值传导render函数中\n        }\n    }\n}\n\nexport default About\n```\n\n### 二、Axios\n\n安装和引入`Axios`插件\n\n打开终端，直接使用npm令进行安装。\n\n```CoffeeScript\nnpm  install axios -S\n```\n\n#### 封装axios\n\n1. 在utils下新建request.js\n\n```JavaScript\nimport axios from 'axios'\n\nconst instance = axios.create({\n  // baseURL: process.env. APP_BASE_API  // 配置环境变量取baseURL\n  baseURL: 'http://localhost:3000/',\n  timeout: 10000,\n})\n\ninstance.interceptors.request.use(\n  config =\u003e config,\n  error =\u003e Promise.reject(error),\n)\n\ninstance.interceptors.response.use(\n  response =\u003e response,\n  error =\u003e Promise.reject(error),\n)\n\nexport default instance\n```\n\n1. 书写api方法\n\n```JavaScript\nimport request from '../utils/request'\n\nexport const getUserList = () =\u003e {\n  return request.get(`/api/user`)\n}\n\nexport const getUserInfo = (params) =\u003e {\n  return request.get(`/api/user/${params.userId}`)\n}\n```\n\n1. 组件使用，在pages下新建js文件\n\n```jsx\nimport { getArticle } from './api/article'\n\nfunction About({ data }) {\n    console.log(data)\n    return (\n        \u003cdiv\u003e\n            {\n                data.map( item =\u003e (\n                \u003cli key={item.id}\u003e{item.title}\u003c/li\u003e\n                ))\n            }\n        \u003c/div\u003e\n    )\n}\n\nexport const getStaticProps = async () =\u003e {\n    let result = await getArticle({per_page: 1})\n    let { data: { data } } = result\n    return {\n        props: {\n            data\n        }\n    }\n}\n\nexport default About\n```\n\n\n\n#### 配置环境变量\n\n`Next.js`是一个轻量级的react服务端渲染应用框架，所以他不用考虑前端经常要涉及到的跨域。可以通过配置环境变量获取各个环境下的请求域名，需要对`Next.js`中环境变量进行一下处理：\n\n1. 创建`.env`文件，在根目录下创建3个`.env`文件\n\n```Rust\n// .env.development\nAPP_ENV=development\nAPP_BASE_API = 'http://localhost:9001'\n\n// .env.test\nAPP_ENV=test\nAPP_BASE_API = 'https://api.test.com'\n\n// .env.production\nAPP_ENV=production\nAPP_BASE_API = 'https://api.prod.com'\n```\n\n1. 配置`next.config.js`\n\n```JavaScript\nmodule.exports = {\n  reactStrictMode: true,\n  // 环境变量\n  env: {\n    APP_ENV: process.env.APP_ENV\n  }\n}\n```\n\n1. 配置`package.json`\n\n```Groovy\n\"scripts\": {\n    \"dev\": \"APP_ENV=development next dev\",\n    // 开发环境中调用线上接口\n    \"dev:prod\": \"APP_ENV=production next dev\",\n    // 打测试包\n    \"build:test\": \"APP_ENV=test next build\",\n    \"build:prod\": \"APP_ENV=production next build\",\n    \"start\": \"next start\",\n    \"lint\": \"next lint\"\n  },\n```\n\n1. 使用\n\n```JavaScript\n// utils/request.js\n\nlet baseURL = process.env.APP_BASE_API\n\n...\n```\n\n#### **rewrites**\n\n虽然Next.js有对动态路由api的开发，但大多前端使用`webpack`较多，`proxy`大多习惯配置在`webpack-dev-server`的`proxy-table`中，但nextjs并未使用到`webpack-dev-server`，大多前端常用到的`proxy-table`无法在`Next.js`中配置。所以我们需要使用到官方提供的`rewrites`。\n\n**成本低，入侵小，支持版本v10.1+**\n\nRewrites allow you to map an incoming request path to a different destination path.\n\n官方解释：重写允许您将传入请求路径映射到不同的目标路径(机翻)[文档地址](https://link.zhihu.com/?target=https://www.nextjs.cn/docs/api-reference/next.config.js/rewrites)\n\n```JavaScript\n//next.config.js\nmodule.exports = {\n  async rewrites() {\n    return {\n      fallback: [\n        {\n          source: '/:path*',\n          destination: `http://localhost:9001/:path*`,\n        },\n      ],\n    }\n  },\n}\n```\n\n# Next.js框架下使用Ant Design UI\n\n1. 加载antd\n\n```Dockerfile\nnpm install antd \n```\n\n1. 在pages目录下_app.js文件，写入下列内容\n\n```JavaScript\nimport '../styles/globals.css' \nimport 'antd/dist/antd.css' \n\nfunction MyApp({ Component, pageProps }) { \n    return \u003cComponent {...pageProps} /\u003e \n} \n\nexport default MyApp\n```\n\n1. 在index.js中引入Button组件\n\n```jsx\nimport Head from 'next/head' \nimport {Button} from 'antd' \n\nexport default function Home() { \n    return ( \n        \u003c\u003e \n            \u003cHead\u003e \n                \u003ctitle\u003eHome\u003c/title\u003e \n            \u003c/Head\u003e \n            \u003cdiv\u003e \u003cButton type=\"primary\"\u003ePrimary Button\u003c/Button\u003e\u003c/div\u003e \n        \u003c/\u003e \n    ) \n}\n```\n\n# Next.js生产环境打包\n\n\n\n```bash\nnpm run build\n```\n\n","title":"Next.js学习手册","summary":"Next.js 是一个 React 开发框架。这意味着 Next.js 基于 React 并提供了部署 React 应用程序所需的所有核心功能。一些常用的功能是服务器端渲染 (SSR)、预渲染、静态站点生成 (SSG)、webpack 支持、页面路由等。","tags":["Next"],"categories":null,"date":"Fri, 30 Jun 2023 16:49:46 GMT","updated":"Fri, 30 Jun 2023 16:50:12 GMT","coverImg":null,"dateYMD":"2023-06-30","wordcount":"本文字数：1,730 字    阅读完需：约 9 分钟"},{"id":"article-04","markdown":"## 🕹开发环境\n\n- React：18.2.0\n- Next：12.1.6\n\n## 背景\n\n使用SVG中的Symbol元素制作Icon图标变得越来越流行，这种技术被称为SVG Sprite。这里所说的Sprite技术，类似于CSS中的Sprite技术。图标图形整合在一起，实际呈现的时候准确显示特定图标。\n\n在写项目时每次引入Icon都会写icon地址，如果 svg 很多的话手动处理起来就会很耗时。\n\n#### 直接使用`next/image`\n\n由于Next的原因，默认加载器不会优化 SVG 图像，如果您需要使用`Image`图像优化 API 提供 SVG 图像，需要进行内部设置：\n\n```javascript\n// next.config.js\n  images: {\n    dangerouslyAllowSVG: true,\n    contentSecurityPolicy: \"default-src 'self'; script-src 'none'; sandbox;\",\n  },\n```\n\n`Headr.tsx`文件内使用Svg图片\n\n```javascript\n\nimport Image from 'next/image'\nimport home from '/icon/home.svg'\n\nconst Header = () =\u003e {\n\t\u003cImage src={home} width={25} height={25} alt=\"Picture of the author\"\u003e\u003c/Image\u003e\n  \n   )\n}\nexport default Header\n```\n\n\n\n## 配置svg-sprite-loader、svgo-loader\n\nsvg-sprite-loader 会把你引入的 svg 塞到一个个 [symbol](https://so.csdn.net/so/search?q=symbol\u0026spm=1001.2101.3001.7020) 中，合成一个大的 svg，最后将这个大的 svg 放入 body 中。symbol 的 id 如果不特别指定，就是你的文件名。\n\nsvgo-loader 是 svg 优化器，包含很多插件。\n\n它可以删除和修改SVG元素，折叠内容，移动属性等等等等。\n\n1. 安装\n\n```bash\n#npm 安装\n  npm install --save-dev svg-sprite-loader svgo-loader\n\n#yarn安装\nyarn add --dev svg-sprite-loader svgo-loader\n```\n\n\n\n2. `next.config.js`中配置\n\n```javascript\nconst nextConfig = {\n  reactStrictMode: true,\n  webpack: (\n    config,\n    { buildId, dev, isServer, defaultLoaders, webpack },\n  ) =\u003e {\n    config.module.rules.push({\n      test:  /\\.svg$/,\n      use: [\n        { loader: 'svg-sprite-loader', options: {} }\n      ],\n    })\n\n    return config\n  },\n}\n\nmodule.exports = nextConfig\n\n```\n\n3.封装Svg组件\n\n`src/components`内新建组件文件夹`Icon`\n\n- `icons`文件夹存放需要使用的`svg`文件\n\n  - `index.ts`文件导出`svg`文件\n\n    ```typescript\n    export { default as home } from './home.svg'\n    export { default as article } from './article.svg'\n    ```\n\n    \n\n- `icon.tsx`组件\n\n```tsx\nimport * as React from 'react'\nimport * as icons from './icons'\n\nexport type Icons = typeof icons\nexport type IconName = keyof Icons\nexport type IconSize = 'small' | 'medium' | 'large'\n\ninterface IconProps {\n  name: IconName\n  size?: IconSize\n}\n\n/**\n * Icon\n */\nexport const Icon: React.FC\u003cIconProps\u003e = ({ name, size = 'small' }) =\u003e {\n  const { viewBox, id } = icons[name]\n  console.log('name', icons[name]);\n  console.log('viewBox', viewBox);\n  console.log('id', id);\n\n  return (\n    \u003csvg viewBox={viewBox}\u003e\n      \u003cuse xlinkHref={`#${id}`} href={`#${id}`} /\u003e\n    \u003c/svg\u003e\n\n  )\n}\n```\n\n\n\n- `icon.module.scss`组件样式\n\n```scss\n@use 'variables';\n\n$size-icon: variables.$size-grid-unit * 2;\n\n.icon {\n  vertical-align: middle;\n  display: inline-block;\n\n  \u0026--small {\n    width: $size-icon;\n    height: $size-icon;\n  }\n\n  \u0026--medium {\n    width: $size-icon * 1.5;\n    height: $size-icon * 1.5;\n  }\n\n  \u0026--large {\n    width: $size-icon * 4;\n    height: $size-icon * 4;\n  }\n}\n```\n\n","title":"Next.js使用svgo-loader svg-sprite-loader处理项目中的Icon","summary":"使用SVG中的Symbol元素制作Icon图标变得越来越流行，这种技术被称为SVG Sprite。这里所说的Sprite技术，类似于CSS中的Sprite技术。图标图形整合在一起，实际呈现的时候准确显示特定图标。","tags":["Next","svg"],"categories":null,"date":"Fri, 30 Jun 2023 16:48:57 GMT","updated":"Fri, 30 Jun 2023 16:49:32 GMT","coverImg":null,"dateYMD":"2023-06-30","wordcount":"本文字数：310 字    阅读完需：约 2 分钟"},{"id":"article-03","markdown":"在日常开发中，经常会遇到一台电脑需要配置多个git账户的场景，例如工作项目在gitlab、日常练习项目在github等等。这就需要我们配置一个共存的开发环境。本文主要介绍如何在mac上如何同时管理多个git账号 （gitlab、gitee、github）及遇到问题的记录。\n\n## 版本\n\nmacOS： 12.3.1 \nGit： 2.32.0\n\n## 查看是否已安装Git\n\n首先确认已安装Git，能够通过过命令能够查看当前安装的版本。\n\n```bash\n\n git –version\n```\n\nMac OSX 中默认都已经安装了Git。可是，Git的版本未必是最新的。可以使用以下命令进行更新：\n\n```bash\ngit clone https://github.com/git/git\n```\n\n## 1. 清除git遗留的历史配置\n\n如果之前设置过全局 user.name 和 user.email，这里必须要清空，\n\n**1.1 查看已配置git信息**\n\n``` bash\n\ngit config --list\n```\n\n**1.2 清空用户名和邮箱信息（未配置跳过此步骤）**\n\n```bash\ngit config --global --unset user.name\ngit config --global --unset user.email\n```\n\n## 2. 生成新的 SSH key\n\n打开终端，切换到对应目录下：\n\n```bash\ncd ~/.ssh\n```\n\n[.ssh文件可能会遇到的问题记录](#mac查找.ss文件注意事项)\n\n接下来 ⬇️ ⬇️ ⬇️ 需要在~/.ssh/路径下执行以下操作命令。\n\n**2.1 GitHub 的钥匙**\n\n设定别名 id_rsa.github，对应于不同的git账号\n\n指定文件路径，方便后面操做：~/.ssh/id_rsa.github\n\n```bash\nssh-keygen -t rsa -f ~/.ssh/id_rsa.github -C \"97*****5@qq.com\"\n```\n\n回车3次(密码可以为空)，在当前路径下能看到两个文件 id_rsa.github 和 id_rsa.github.pub ，对应于私钥和公钥。\n\n**2.2 Gitee 的钥匙**\n\n```bash \nssh-keygen -t rsa -f ~/.ssh/id_rsa.gitee -C \"*******@qq.com\"\n```\n\n**2.3 GitLab 的钥匙**\n\n```bash\nssh-keygen -t rsa -f ~/.ssh/id_rsa.gitlab -C \"*******@company.com\"\n```\n\n**2.4 完成后会在.ssh目录下生成一下文件**\n\n- id_rsa.github\t\t\n- id_rsa.github.pub\t\n\n- id_rsa.gitlab\n- id_rsa.gitlab.pub\n\n- id_rsa.gitee\n- id_rsa.gitee.pub\t\n\n\n## 3. 在 ~/.ssh 目录下新建一个config文件\n\n**3.1 终端新建config文件并打开**\n\n```bash\n# 新建\ntouch ~/.ssh/config\n\n# ～/.ssh目录下打开config\nopen config\n```\n\n**3.2 config里面填写内容（完整配置）**\n\n```bash\n#github\n\n Host github.com\n\n HostName github.com\n\n PreferredAuthentications publickey\n\n IdentityFile ~/.ssh/id_rsa.github\n\n\n#gitee\n\n Host gitee.com\n\n HostName gitee.com\n\nPreferredAuthentications publickey\n\n IdentityFile ~/.ssh/id_rsa.gitee\n\n# gitlab \n\n# 此处Host和Host Name需要设置为自己项目的地址\n# 假设有仓库git@gitlab.mygitlab.com:iEngne/test.git，取冒号前的gitlab.mygitlab.com\n\nHost gitlab.mygitlab.com\n\nHostName gitlab.mygitlab.com\n\nPreferredAuthentications publickey\n\nIdentityFile ~/.ssh/id_rsa.gitlab\n```\n\n以下内容是上述配置文件中使用到的配置字段信息进行简单解释：\n\n- Host\n它涵盖了下面一个段的配置，我们可以通过他来替代将要连接的服务器地址。\n这里可以使用任意字段或通配符。\n当ssh的时候如果服务器地址能匹配上这里Host指定的值，则Host下面指定的HostName将被作为最终的服务器地址使用，并且将使用该Host字段下面配置的所有自定义配置来覆盖默认的/etc/ssh/ssh_config配置信息。\n\n- Port\n自定义的端口。默认为22，可不配置\n\n- User\n自定义的用户名，默认为git，可不配置\n\n- HostName\n真正连接的服务器地址\n\n- PreferredAuthentications\n指定优先使用哪种方式验证，支持密码和秘钥验证方式\n\n- IdentityFile\n指定本次连接使用的密钥文件\n\n## 4. 在远程仓库gitlab上添加title和key\n\n### GitHub\n \n在～/.ssh目录下打开id_rsa.github.pub并复制内容\n\n```bash\n# 打开文件\ncat id_rsa.github.pub\n\n#复制ssh-rsa 开头的内容\n```\n\n直达地址：https://github.com/settings/keys\n\n![](/public/images/macInstallGit/github.png)\n\n### Gitee\n \n在～/.ssh目录下打开id_rsa.gitee.pub并复制内容\n\n```bash\n# 打开文件\ncat id_rsa.gitee.pub\n\n#复制ssh-rsa 开头的内容\n```\n\n直达地址：https://gitee.com/profile/sshkeys\n\n![](/public/images/macInstallGit/gitee.png)\n\n### GitLab\n \n在～/.ssh目录下打开id_rsa.gitlab.pub并复制内容\n\n```bash\n# 打开文件\ncat id_rsa.gitlab.pub\n\n#复制ssh-rsa 开头的内容\n```\n\n![](/public/images/macInstallGit/gitlab.png)\n\n## 用ssh命令分别测试\n\n```bash\n\nssh -T git@gitee.com\nssh -T git@github.com\nssh -T git@gitlab.com\n```\n\n这里以gitee为例，成功的话会返回下图内容\n![](mac安装node/last.webp)\n\n## mac查找.ss文件注意事项\n **1. .ssh已存在，但是cd ～/.ssh提示未找到**\n\n 我遇到的问题：\n 1. cd ~/.ssh\n ``` \n MacBook-Pro ~ % cd ~/.ssh\n cd: no such file or directory: /Users/hz/.ssh\n ```\n\n 2. ssh-keygen\n\n```bash\n\nssh-keygen -t rsa\nGenerating public/private rsa key pair.\nEnter file in which to save the key (/root/.ssh/id_rsa): \nEnter passphrase (empty for no passphrase): \nEnter same passphrase again: \nSaving key \"/root/.ssh/id_rsa\" failed: Not a directory\n```\n\n3. .ssh提示不是一个文件，查看文件ls -la\n\n观察.ssh 和其他文件夹的区别,可以发现已经存在的.ssh并不是一个文件夹，我们可以删除已有的 .ssh，再ssh-keygen就会有.ssh文件夹了，\n\n4. 删除.ssh文件，新建.ssh文件夹\n\n```bash\n# 删除.ssh 文件\nrm -rf .ssh\n\n# 新建.ssh文件夹\nmkdir ～/ .ssh\n```\n\n##  配置git config\n\n一般来说，安装好 git 后，我们都会配置一个全局的 config 信息。但是，我们需要在一台电脑上配置多个用户信息的需求，此时就不能够用一个全局配置搞定一切了。因为不仅仓库地址不一样，仓库的用户名和邮箱都不一样。\n\n git 的配置分为三级别，System —\u003e Global —\u003eLocal。System 即系统级别，Global 为配置的全局，Local 为仓库级别，优先级是 Local \u003e Global \u003e System。\n\n因为我们并没有给仓库配置用户名，又在一开始清除了全局的用户名，因此此时你提交的话，就会使用 System 级别的用户名作为你提交的用户名，也就是你的系统主机名了。\n\n### system系统级\n\n系统级配置文件含有系统里每位用户及他们所拥有的仓库的配置值。其位置为git的安装目录下的/etc/gitconfig，即如果git的安装目录为D:\\Git，则配置文件地址为D:\\Git\\etc\\gitconfig。\n\n**优先度最低，其配置值可被全局级配置和本地级配置的值覆盖**，一般我们很少会使用系统级的配置。\n\n### global全局级\n\n全局级配置文件包含当前系统用户的拥有的仓库配置值，每个系统用户的全局级配置相互隔离。全局级别的配置默认保存在当前系统用户的主目录下的 .gitconfig 文件内。Windows通常保存在C:\\Users\\xxxx\\.gitconfig，Linux为/home/xxx/.gitconfig。\n\n**优先度比系统级高，可覆盖系统级的配置值**，全局级的配置平时使用得比较多，比如设置账号和邮箱：\n\n```bash\ngit config --global user.name “xxxxxx”\ngit config --global user.email “xxxxx@panyanbin.com”\n```\n\n查看配置信息\n\n```bash\ngit config --global --list\n```\n\n### local本地级\n\n本地级别的配置保存在当前仓库下面的 .git\\config 文件内，通常 .git 文件夹是隐藏的，Window要在文件管理器的文件夹选项中打开显示隐藏文件夹才可以看到。这里的配置仅对当前仓库有效，不影响其他的仓库。\n\n**优先级别最高，如果全局级别或系统级别的配置里出现了同一配置项，则以本地级别配置内容为准**\n\n```bash\ngit config --local user.name “xxxxxx”\ngit config --local user.email “xxxxxx@foxmail.com\"\n```\n\n查看配置信息\n\n```bash\ngit config --local --list\n```\n","title":"mac同时配置gitLab、gitee、github共存的开发环境","summary":"在日常开发中，经常会遇到一台电脑需要配置多个git账户的场景，例如工作项目在gitlab、日常练习项目在github等等。这就需要我们配置一个共存的开发环境。本文主要介绍如何在mac上如何同时管理多个git账号 （gitlab、gitee、github）及遇到问题的记录。","tags":["mac","git"],"categories":null,"date":"Fri, 30 Jun 2023 16:44:59 GMT","updated":"Fri, 30 Jun 2023 16:45:31 GMT","coverImg":null,"dateYMD":"2023-06-30","wordcount":"本文字数：500 字    阅读完需：约 3 分钟"},{"id":"article-02","markdown":"## 安装node.js\n\n本文主要介绍了两种安装方式，官网下载 / brew安装，两种方案均有详细介绍，可以按需采用。\n\n### 官网安装\n\n1. 访问nodejs官网，点击选框区域稳定版，并下载https://nodejs.org/en\n\n![](/public/images/macInstallnode/下载首页.png)\n\n2. 开始安装，双击刚才下载的安装包，按默认步骤安装即可\n  \n![](/public/images/macInstallnode/安装-01.png)\n\n![](/public/images/macInstallnode/安装-02.png)\n\n![](/public/images/macInstallnode/安装-03.png)\n\n![](/public/images/macInstallnode/安装-04.png)\n\n3. 安装完成后，通过命令行查看node版本及npm版本\n\n``` bash\n\n#查看node版本\nnode -v\n\n#查看npm版本\nnpm -v\n```\n\n![](/public/images/macInstallnode/安装-05.png)\n\n### 命令行brew安装\n\n利用Homebrew安装(简称brew,MacOSX上的软件包管理工具，能在Mac中方便的安装软件或者卸载软件)\n\n打开终端，执行以下命令安装Homebrew：\n\n``` bash\n\nruby -e \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install)\"\n```\n\n然后查看一下brew是否安装成功，如果出现版本信息，就说明安装成功，输入以下命令：\n\n``` bash\n\nbrew -v\n```\n\n安装node.js\n\n``` bash\n\nbrew install node\n```\n\n安装成功后，通过命令行查看node版本及npm版本\n\n``` bash\n\n#查看node版本\nnode -v\n\n#查看npm版本\nnpm -v\n```\n\n## node多版本自由切换\n\n因为一些老的项目不兼容新的node版本，有时候我们需要安装多个node,并随时自动切换不同的node版本以便进行相关项目测试。目前有多种的解决方案，我常用的就是nvm/n，在window电脑上常用nvm管理，mac电脑推荐使用n管理。\n\n1. 首先安装n模块\n\n``` bash\n\nsudo npm install -g n\n```\n\n### 常用命令\n\n1. 使用n加版本号就可以安装其他版,也可以切换使用版本\n\n``` bash\n\nsudo n 10.12.0\n```\n\n2. 升级node.js到最新稳定版\n\n``` bash\n\nsudo n stable\n```\n\n2. 升级node.js到最新版\n\n``` bash\n\nsudo n latest\n```\n\n3. 查看当前使用node版本\n\n``` bash\n\nnode -v\n```\n\n4. 查看所有已安装的node版本，可以根据上下和回车选择要使用的版本\n\n``` bash\n\nsudo n\n```\n\n5. 删除某个版本\n\n``` bash\n\nsudo n rm x.x.x\n```","title":"mac安装node.js并且实现node多版本自由切换","summary":"本文主要介绍了两种安装方式，官网下载 / brew安装，两种方案均有详细介绍，可以按需采用。","tags":["mac","node","brew"],"categories":null,"date":"Fri, 30 Jun 2023 16:44:12 GMT","updated":"Fri, 30 Jun 2023 16:44:48 GMT","coverImg":null,"dateYMD":"2023-06-30","wordcount":"本文字数：150 字    阅读完需：约 1 分钟"},{"id":"article-01","markdown":"[NProgress](https://github.com/rstacruz/nprogress)实现显示加载进度条效果，具有逼真的动画涓涓细流来说服你的用户，无页面跳转效果 ，极大提高用户体验效果.\n\n本文主要介绍了Nprogress的基本用法和配置，以及在Vue、React等场景下的使用方法。\n\n## 效果图\n\n## 安装\n\n1. npm安装\n\n``` bash\n// 下载安装\nnpm install --save nprogerss \n```\n\n``` js\n// 引用\nimport NProgress from 'nprogress'\nimport 'nprogress/nprogress.css'\n```\n\n1. 外链引入方式\n\n``` js\n\u003cscript src='nprogress.js'\u003e\u003c/script\u003e\n\u003clink rel='stylesheet' href='nprogress.css'/\u003e\n```\n\n1. CDN引用\n  \n``` js\nhttps://unpkg.com/nprogress@0.2.0/nprogress.js\nhttps://unpkg.com/nprogress@0.2.0/nprogress.css\n```\n## 用法\n\n1. 基本用法\n\n``` js\nNProgress.start();\t\t\t// 开启进度条\nNProgress.done();\t\t\t// 关闭进度条\n```\n\n2. 高级用法\n\n**设置百分比** ：调用 .set(n) 方法，其中n的范围0-1   \n\n```\nNProgress.set(0.0);     // Sorta same as .start()\nNProgress.set(0.4);\nNProgress.set(1.0);     // Sorta same as .done()\n```\n\n**增量**：调用 .inc() 方法，以随机量递增进度条，永远不会达到100%，用于每个图像负载（或类似）\n\n```\nNProgress.inc();\n```\n\n**特定值增量**：调用 .inc(n) 方法以特定值递增进度条\n\n```\nNProgress.inc(0.2);    // This will get the current status value and adds 0.2 until status is 0.994\n```\n\n**强制完成**：通过传递 true 到 .done() 方法，将显示进度条，即使它未显示（默认如果不调用 .start() 方法， .done() 方法不会做任何事）\n\n```\nNProgress.done(true);\n```\n\n**获取状态值**：使用 .status 获取状态值\n\n## 配置\n\n**minimum**：更改启动时使用的最小百分比（默认：0.08）\n\n```\nNProgress.configure({ minimum: 0.1 });\n```\n\n**template**：可以使用 template 更改标记，若要使进度条保持工作，请将元素 role='bar' 保留在那里，参阅默认模板以进行参考\n\n```\nNProgress.configure({\n  template: \"\u003cdiv class='....'\u003e...\u003c/div\u003e\"\n});\n```\n\n**easing和speed**：使用 easing（a CSS easing string）和 speed（ms）调整动画（默认：ease 和 200）\n\n```\nNProgress.configure({ easing: 'ease', speed: 500 });\n```\n\n**trickle**：将其设置为 false 关闭自动递增行为（默认：true）\n\n```\nNProgress.configure({ trickle: false });\n```\n\n**trickleSpeed**：调整滴答/递增的频繁度（以ms表示）\n\n```\nNProgress.configure({ trickleSpeed: 200 });\n```\n\n**showSpinner**：将其设置为 false 来关闭 Loading Spinner（默认：true）\n\n```\nNProgress.configure({ showSpinner: false });\n```\n\n**parent**：指定此选项以更改父容器（默认：body）\n\n```\nNProgress.configure({ parent: '#container' });\n```\n\n## 定制\n\n根据您的喜好编辑 nprogress.css 文件\n\n## 页面切换中使用（Vue）\n\n在路由文件中进行配置\n\n```\n// ~/router/index.js\n\nimport Vue from 'vue'\nimport VueRouter from 'vue-router'\n//引入nprogress 进度条插件\nimport NProgress from 'nprogress'\n\nVue.use(VueRouter);\n\n// 简单配置  进度条,可以不配置：在axios中我们不再做配置，以用来区分。\nNProgress.inc(0.2)\nNProgress.configure({ easing: 'ease', speed: 500, showSpinner: false })\n\n\nexport const constRouter = [\n    {\n        path: '/login',\n        component: () =\u003e import('@/views/login/Login'),\n    },\n    ...\n]\n\nconst router = new VueRouter({\n    mode: 'history',\n    base: process.env.BASE_URL,\n    routes: constRouter\n})\n\n// 页面路由刚开始切换的时候\nrouter.beforeEach(async (to,from,next) =\u003e {\n\t// 开启进度条\n\tNProgress.start();\n})\n\n// 页面路由切换完毕的时候\nrouter.afterEach(() =\u003e {\n\t// 关闭进度条\n    NProgress.done()\n})\n\n\nexport default router\n```\n\n## 页面切换中使用（React）\n\n在route中绑定nprogress\n\n新建一个FancyRoute.js文件，在hooks中绑定nprogress的开始与结尾，这样在进行路由的切换时就可以触发到nprogress\n\n```\nimport React from 'react'\nimport { Route } from 'react-router-dom'\nimport nprogress from 'nprogress'\nimport 'nprogress/nprogress.css';\nimport '../resources/FancyRoute.css'\nconst FancyRoute = props =\u003e {\n  React.useState(nprogress.start());\n  React.useEffect(() =\u003e {\n    nprogress.done();\n    return () =\u003e nprogress.start();\n  });\n  return (\n    \u003cRoute {...props} /\u003e\n  );\n};\nexport default FancyRoute\n```\n\n在对应的route.jsx文件中使用到刚编写的FancyRoute.js文件\n\n```\nimport React, { Suspense, lazy } from 'react';\nimport {  Switch, NavLink } from 'react-router-dom';\nimport { Layout, Menu } from 'antd';\nimport FancyRoute from './plugin/FancyRoute';\nconst Home = lazy(() =\u003e import('./components/main'));\nconst About = lazy(() =\u003e import('./components/test'));\nconst { Header, Content, Footer } = Layout;\nconst BasicRoute = () =\u003e (\n  \u003cLayout\u003e\n    \u003cHeader style={{ position: 'fixed', zIndex: 1, width: '100%' }}\u003e\n      \u003cdiv className=\"logo\" /\u003e\n      \u003cMenu theme=\"dark\" mode=\"horizontal\" defaultSelectedKeys={['2']}\u003e\n        \u003cMenu.Item key=\"1\"\u003e\u003cNavLink to={'/'}\u003enav 1\u003c/NavLink\u003e\u003c/Menu.Item\u003e\n        \u003cMenu.Item key=\"2\"\u003e\u003cNavLink to={'home'}\u003enav 2\u003c/NavLink\u003e\u003c/Menu.Item\u003e\n        \u003cMenu.Item key=\"3\"\u003e\u003cNavLink to={'/'}\u003enav 3\u003c/NavLink\u003e\u003c/Menu.Item\u003e\n      \u003c/Menu\u003e\n    \u003c/Header\u003e\n    \u003cContent style={{ marginTop: 64 }}\u003e\n      \u003cSuspense fallback={\u003cdiv\u003eLoading...\u003c/div\u003e}\u003e\n        \u003cSwitch\u003e\n             {/*引用上一步创建的FancyRoute*/}\n          \u003cFancyRoute exact path=\"/\" component={Home} /\u003e\n          \u003cFancyRoute path=\"/home\" component={About} /\u003e\n        \u003c/Switch\u003e\n      \u003c/Suspense\u003e\n    \u003c/Content\u003e\n    \u003cFooter style={{ textAlign: 'center' }}\u003eAnt Design ©2018 Created by Ant UED\u003c/Footer\u003e\n  \u003c/Layout\u003e\n);\nexport default BasicRoute;\n```\n\n## 接口请求中使用\n\n在【axios请求配置】文件中:\n\n```\nimport axios from 'axios'\n//引入nprogress 进度条插件\nimport NProgress from 'nprogress'\n\n// 创建axios实例\nconst service = axios.create({\n    baseURL: process.env.VUE_APP_BASE_API, //URL地址   环境变量文件\n    timeout: 5000 ,//超时\n})\n\n// 请求拦截器\nservice.interceptors.request.use(\n    config =\u003e {\n    \t// 开启进度条\n\t\tNProgress.start();\n        return config\n    },\n    error =\u003e {\n        return Promise.reject(error)\n    }\n)\n\n// 响应拦截器\nservice.interceptors.response.use(\n    response =\u003e{\n        // 关闭进度条\n        NProgress.done()\n    \treturn Promise.reject(response)\n    },\n    error =\u003e {\n        // 关闭进度条\n        NProgress.done()\n        return Promise.reject(error)\n    }\n)\n\nexport default service;\n```","title":"浏览器进度条-Nprogress","summary":"本文主要介绍了Nprogress的基本用法和配置，以及在Vue、React等场景下的使用方法。","tags":["vue","React","npm"],"categories":null,"date":"Fri, 30 Jun 2023 16:33:43 GMT","updated":"Fri, 30 Jun 2023 16:33:43 GMT","coverImg":null,"dateYMD":"2023-06-30","wordcount":"本文字数：520 字    阅读完需：约 3 分钟"},{"id":"article-11","markdown":"##  前言\n为了获取实时数据，前端需要和后端保持通信，HTTP 协议只能是客户端向服务器发出请求，服务器返回查询结果。这种单向请求的特点，注定了如果服务器有连续的状态变化，客户端要获知就非常麻烦。我们只能使用\"轮询\"：每隔一段时候，就发出一个询问，了解服务器有没有新的信息。一般通过以下几种方式实现即时通讯。\n\n\n\u003e 即时通讯：短轮询、长链接、长轮询、websocket \n#####  短轮询的原理很简单，每隔一段时间客户端就发出一个请求，去获取服务器最新的数据， 一定程度上模拟实现了即时通讯。 \n\n优点：兼容性强，实现非常简单 \n缺点：延迟性高，非常消耗请求资源，影响性能 \n\n#####  长轮询优缺点： \n优点：兼容性好，资源浪费较小 \n缺点：服务器 hold连接会消耗资源，返回数据顺序无保证，难于管理维护 \n#####  长连接优缺点： \n优点：兼容性好，消息即时到达，不发无用请求 \n缺点：服务器维护长连接消耗资源 \n\n##### Websocket是一个全新的、独立的协议，基于 TCP协议，与 http协议兼容、却不会融入 http协议，仅仅作为 html5的一部分，其作用就是在服务器和客户端之间建立实时的双向 通信。\n优点：真正意义上的实时双向通信，性能好，低延迟 \n缺点：独立与 http的协议，因此需要额外的项目改造，使用复杂度高，必须引入成熟的库，无法兼容低版本浏览器\n\n轮询的效率低，非常浪费资源（因为必须不停连接，或者 HTTP 连接始终打开）。因此，在更多的时候一般都会采用websocket来实现即时通讯的需求。\n\u003e   WebSocket心跳及重连机制\n\nwebsocket是前后端交互的长连接，在使用的过程中，遇到**弱网或者网络暂时断连**的情况时，服务端并没有触发onclose的事件，客户端也无法得知当前连接是否已经断开，服务端会继续向客户端发送多余链接，并且这些数据还会丢失。因此为了保证连接的可持续性和稳定性，我们需要有一套机制来检测客户端和服务端是否处于正常连接状态，websocket心跳重连就应运而生。\n\n### 完整代码\n创建websocket实例化的时候，一般会绑定各个回调事件需要执行的函数：\n```javascript\n\u003chtml\u003e\n\u003chead\u003e\n  \u003cmeta charset=\"utf-8\"\u003e\n  \u003ctitle\u003eWebSocket Demo\u003c/title\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n  \u003cscript type=\"text/javascript\"\u003e\n    // var ws = new WebSocket(\"wss://echo.websocket.org\");\n    /*\n    ws.onerror = function(e) {\n      console.log('已关闭');\n    };\n    ws.onopen = function(e) {\n      console.log('握手成功');\n      ws.send('123456789');\n    }\n    ws.onclose = function() {\n      console.log('已关闭');\n    }\n    ws.onmessage = function(e) {\n      console.log('收到消息');\n      console.log(e);\n    }\n    */\n    \n    var lockReconnect = false;//避免重复连接\n    var wsUrl = \"wss://echo.websocket.org\";\n    var ws;\n    var tt;\n    function createWebSocket() {\n      try {\n        ws = new WebSocket(wsUrl);\n        init();\n      } catch(e) {\n        console.log('catch');\n        reconnect(wsUrl);\n      }\n    }\n    function init() {\n      ws.onclose = function () {\n        console.log('链接关闭');\n        reconnect(wsUrl);\n      };\n      ws.onerror = function() {\n        console.log('发生异常了');\n        reconnect(wsUrl);\n      };\n      ws.onopen = function () {\n        //心跳检测重置\n        heartCheck.start();\n      };\n      ws.onmessage = function (event) {\n        //拿到任何消息都说明当前连接是正常的\n        console.log('接收到消息');\n        heartCheck.start();\n      }\n    }\n    function reconnect(url) {\n      if(lockReconnect) {\n        return;\n      };\n      lockReconnect = true;\n      //没连接上会一直重连，设置延迟避免请求过多\n      tt \u0026\u0026 clearTimeout(tt);\n      tt = setTimeout(function () {\n        createWebSocket(url);\n        lockReconnect = false;\n      }, 4000);\n    }\n    //心跳检测\n    var heartCheck = {\n      timeout: 3000,\n      timeoutObj: null,\n      serverTimeoutObj: null,\n      start: function(){\n        console.log('start');\n        var self = this;\n        this.timeoutObj \u0026\u0026 clearTimeout(this.timeoutObj);\n        this.serverTimeoutObj \u0026\u0026 clearTimeout(this.serverTimeoutObj);\n        this.timeoutObj = setTimeout(function(){\n          //这里发送一个心跳，后端收到后，返回一个心跳消息，\n          console.log('55555');\n          ws.send(\"123456789\");\n          self.serverTimeoutObj = setTimeout(function() {\n            console.log(111);\n            console.log(ws);\n            ws.close();\n            // createWebSocket();\n          }, self.timeout);\n\n        }, this.timeout)\n      }\n    }\n    createWebSocket(wsUrl);\n  \u003c/script\u003e\n\u003c/body\u003e\n\u003c/html\u003e\n```\n###  实现思路\n\n 1、第一步页面初始化，先调用createWebSocket函数，目的是创建一个websocket的方法：new WebSocket(wsUrl);因此封装成函数内如下代码：\n```javascript\nfunction createWebSocket() {\n  try {\n    ws = new WebSocket(wsUrl);\n    init();\n  } catch(e) {\n    console.log('catch');\n    reconnect(wsUrl);\n  }\n}\n```\n 2、第二步调用init方法，该方法内把一些监听事件封装如下：\n 当网络断开的时候，会先调用onerror，onclose事件可以监听到，会调用reconnect方法进行重连操作。正常的情况下，是先调用\nonopen方法的，当接收到数据时，会被onmessage事件监听到。\n```javascript\nfunction init() {\n  ws.onclose = function () {\n    console.log('链接关闭');\n    reconnect(wsUrl);\n  };\n  ws.onerror = function() {\n    console.log('发生异常了');\n    reconnect(wsUrl);\n  };\n  ws.onopen = function () {\n    //心跳检测重置\n    heartCheck.start();\n  };\n  ws.onmessage = function (event) {\n    //拿到任何消息都说明当前连接是正常的\n    console.log('接收到消息');\n    heartCheck.start();\n  }\n}\n```\n3、重连操作 reconnect代码如下：\n如果网络断开的话，会执行reconnect方法，使用了一个定时器，4秒后会重新创建一个新的websocket链接，重新调用createWebSocket函数，重新会执行及发送数据给服务器端。\n```javascript\nvar lockReconnect = false;//避免重复连接\nfunction reconnect(url) {\n  if(lockReconnect) {\n    return;\n  };\n  lockReconnect = true;\n  //没连接上会一直重连，设置延迟避免请求过多\n  tt \u0026\u0026 clearTimeout(tt);\n  tt = setTimeout(function () {\n    createWebSocket(url);\n    lockReconnect = false;\n  }, 4000);\n}\n```\n\n4、 最后一步就是实现心跳检测的代码：\n```javascript\n//心跳检测\nvar heartCheck = {\n  timeout: 3000,\n  timeoutObj: null,\n  serverTimeoutObj: null,\n  start: function(){\n    console.log('start');\n    var self = this;\n    this.timeoutObj \u0026\u0026 clearTimeout(this.timeoutObj);\n    this.serverTimeoutObj \u0026\u0026 clearTimeout(this.serverTimeoutObj);\n    this.timeoutObj = setTimeout(function(){\n      //这里发送一个心跳，后端收到后，返回一个心跳消息，\n      //onmessage拿到返回的心跳就说明连接正常\n      console.log('55555');\n      ws.send(\"123456789\");\n      self.serverTimeoutObj = setTimeout(function() {\n        console.log(111);\n        console.log(ws);\n        ws.close();\n        // createWebSocket();\n      }, self.timeout);\n\n    }, this.timeout)\n  }\n}\n```","title":"Websocket心跳检测、重连机制","summary":"为了获取实时数据，前端需要和后端保持通信，HTTP 协议只能是客户端向服务器发出请求，服务器返回查询结果。这种单向请求的特点，注定了如果服务器有连续的状态变化，客户端要获知就非常麻烦。我们只能使用\"轮询\"：每隔一段时候，就发出一个询问，了解服务器有没有新的信息。一般通过以下几种方式实现即时通讯。","tags":["javascript","WebSocket"],"categories":null,"date":"Wed, 09 Mar 2022 13:44:55 GMT","updated":"Sat, 08 Jul 2023 10:39:48 GMT","coverImg":null,"dateYMD":"2022-03-09","wordcount":"本文字数：350 字    阅读完需：约 2 分钟"},{"id":"article-13","markdown":"### 首先我们要先了解数据埋点，到底有什么用处？\n \u003e **1、对设计师而言**\n \u003e         根据埋点统计出页面元素的点击，页面按钮的点击转化，有助于在后续中作进一步视觉调优。\n\n \u003e  **2、对产品/运营/推广而言**\n        可作为产品/运营/推广当次产品功能/运营活动/渠道推广的部分效果评估指标；也可作为其下次产品/运营/推广需求的数据支撑。\n\n \u003e **3、对整体项目而言**\n         将适量的数据，同步给项目组内的其他成员，能适当提高团队的荣誉感（数据表现好时）、危机感（数据表现差时）。\n\n### 常见的数据埋点方式有以下三种：\n\n 1. 代码埋点\n 2. 全埋点\n 3. 可视化埋点\n\n## 一、代码埋点\n代码埋点出现的时间很早了，在 Google Analytics 年代，就已经出现了类似的方案了。目前，国内的主要第三方数据分析服务商，如百度统计、友盟、TalkingData 等都提供了这一方案。Sensors Analytics 也一样提供了 iOS、Android、Web 等主流平台的代码埋点方案。\n\n它的技术原理也很简单，在APP或者界面初始化的时候，初始化第三方数据分析服务商的SDK，然后在某个事件发生时就调用SDK里面相应的数据发送接口发送数据。例如，我们想统计APP里面某个按钮的点击次数，则在APP的某个按钮被点击时，可以在这个按钮对应的 OnClick 函数里面调用SDK提供的数据发送接口来发送数据。\n##### 优点：\n一方面使用者控制精准，可以非常精确地选择什么时候发送数据；同时使用者可以比较方便地设置自定义属性、自定义事件，传递比较丰富的数据到服务端。\n##### 缺点\n首先，埋点代价比较大，每一个控件的埋点都需要添加相应的代码，不仅工作量大，而且限定了必须是技术人员才能完成；其次是更新的代价比较大，每一次更新埋点方案，都必须改代码，然后通过各个应用市场进行分发，并且总会有相当多数量的用户不喜欢更新APP，这样埋点代码也就得不到更新了；最后，就是所有前端埋点方案都会面临的数据传输时效性和可靠性的问题了，这个问题就只能通过在后端收集数据来解决了。\n##### 适用场景\n- 需要采集一些非点击的、 不可视的行为，或需要整合用户身份信息和行为附带属性信息的；\n- 对于前端、 服务端均能采集到的信息，优先选择服务端埋点。\n\n## 二、无埋点\n无埋点、无痕埋点、自动埋点，指的都是全埋点。这种埋点方式想要实现的效果是全自动化埋点，将客户端的用户行为尽可能地全面采集，然后通过界面配置的方式对关键行为进行定义。\n\n使用这种方案，只需要在产品中嵌入 SDK，等于做了一个统一的埋点，每次有用户行为分析的需求，都不用再走一次完整的埋点流程。\n##### 优点：\n- 统一埋点，高效。\n##### 缺点\n- 只能覆盖基本的点击、展示等用户行为；\n- 采集的数据量非常大，随着数据量上升，可能会导致客户端崩溃的概率也会上升，更多的数据量同时也意味着更多的电量、流量和内存消耗；\n- 采集回来的数据需要二次梳理和加工，因为机器无法在采集时按照我们想要的方式对全部事件进行有意义的命名，甚至无法保证采集上来的事件都正好是正确的；\n- 不支持用户身份信息和行为附带的属性信息的整合。\n\n##### 适用场景\n- 业务/产品相对比较简单，只看PV/UV等数据。\n\n## 三、可视化埋点\n通过可视化交互的手段，代替代码埋点。将业务代码和埋点代码分离，提供一个可视化交互的页面，输入为业务代码，通过这个可视化系统，可以在业务代码中自定义的增加埋点事件等等，最后输出的代码耦合了业务代码和埋点代码。\n\n可视化埋点听起来比较高大上，实际上跟代码埋点还是区别不大。也就是用一个系统来实现手动插入代码埋点的过程。\n##### 优点\n - 无需研发人员介入，产品运营可以直接在网站或移动应用的真实界面上操作埋点 ；\n - 埋点之后立即可以验证埋点是否正确；\n - 埋点部署到所有客户端也是几乎实时生效的。\n##### 缺点\n - 只针对点击可见元素的，一些动态页面、不可见的行为是采集不到的；\n - 对于点击操作附带的业务属性，比较难实现；\n - 为了确保埋点准确性，可视化埋点也逐步整合了更为复杂的高级设置，操作起来也很低效。\n##### 适用场景\n- 业务/产品相对比较简单，只看一些不和服务端交互的行为统计。","title":"常见的数据埋点方式介绍","summary":"根据埋点统计出页面元素的点击，页面按钮的点击转化，有助于在后续中作进一步视觉调优.","tags":["javascript","Vue"],"categories":null,"date":"Mon, 17 Jan 2022 14:01:22 GMT","updated":"Sat, 08 Jul 2023 10:45:11 GMT","coverImg":null,"dateYMD":"2022-01-17","wordcount":"本文字数：30 字    阅读完需：约 1 分钟"},{"id":"article-12","markdown":"\u003e 数据埋点在现在的项目开发中都是不较比常见的，尤其是在电商公司，数据的统计分析尤为重要，通过数据分析可以提升用户的购买体验，方便运营和产品调整销售策略等等。埋点就是网站分析的一种常用的数据采集方法。\n\n#### 目前主流埋点方案\n\n 1. 代码埋点\n 2. 可视化埋点\n 3. 无埋点\n\n注：关于埋点方式的详细介绍可以看我的另外一篇文章： [常见的数据埋点方式介绍](https://blog.csdn.net/lhz_19/article/details/122536636)\n\n## 本文主要介绍了代码埋点的方案\n代码埋点分为 **命令式埋点** 、**声明式埋点**\n### 一、命令式埋点\n命令式埋点，顾名思义，开发者需要手动在需要埋点的节点处进行埋点。如点击按钮或链接后的回调函数、页面ready时进行请求的发送。\n```javascript\n// 页面加载时发送埋点请求\n$(document).ready(function(){\n   // ... 这里存在一些业务逻辑\n   sendRequest(params);\n});\n// 按钮点击时发送埋点请求\n$('button').click(function(){\n   // ... 这里存在一些业务逻辑\n   sendRequest(params);\n});\n```\n可以很容易发现，这样的做法很有可能会将埋点代码侵入业务代码，这使整体业务代码变得繁琐，容易出错，且后续代码会愈加膨胀，难以维护。所以，我们需要让埋点的代码与具体的业务逻辑解耦，即 声明式埋点 ，从而提高埋点的效率和代码的可维护性。\n###  二、声明式埋点\n\u003e ##### 点击埋点：\n\u003e 自定义指令实现统计用户在应用内的每一次点击事件，如新闻的浏览次数、文件下载的次数、推荐商品的命中次数等。\n\n在项目入口文件 main.js 中配置我们的自定义指令\n```javascript\nVue.directive('log', {\n  bind(el, binding) {\n    el.addEventListener('click', () =\u003e {\n       Axios.post  //发送请求\n    }, false);\n  }\n});\n```\n组件中配置使用v-log指令，加上详情参数就可以完成用户轨迹记录。\n```javascript\n// caption表示埋点的模块；paras表示用户的行为\n\u003cbutton v-log=\"{caption:'登录页', paras: '用户点击验证码发送'}\"\u003e发送验证码\u003c/button\u003e\n```\n\u003e ##### 页面埋点：\n\u003e 统计用户进入或离开页面的各种维度信息，如页面浏览次数（PV）、浏览页面人数（UV）、页面停留时间、浏览器信息等。\n\n使用 vue-router 的 beforeEach 或者 afterEach 钩子上报数据，具体使用哪个最好是根据业务逻辑来选择。\n```javascript\nimport router from './router'\nlet startTime = Date.now()\nlet currentTime\nrouter.beforeEach((to, from, next) =\u003e {\n  if (to) {\n  \t// 第一步：页面跳转后记录一下当前的时间 currentTime\n  \tcurrentTime = Date.now()\n  \t// 第二步：计算 currentTime - startTime 的 差值 \n    console.log('用户由 ', from.name, ' 页面 跳转到 ', to.name, ' 页面，在 ', from.name, ' 页面停留了 ', currentTime - startTime, '毫秒。转换成秒数约为：', parseInt((currentTime - startTime) / 1000))\n    // 通过计算currentTime - startTime 的 差值 之后，再上报数据\n    ...\n    // 第三步：每次都要初始化一下 startTime\n    startTime = Date.now()\n  }\n});\nexport default router\n```\n\n","title":"vue项目进行前端埋点，记录页面停留时间","summary":"数据埋点在现在的项目开发中都是不较比常见的，尤其是在电商公司，数据的统计分析尤为重要，通过数据分析可以提升用户的购买体验，方便运营和产品调整销售策略等等。埋点就是网站分析的一种常用的数据采集方法。","tags":["javascript","Vue"],"categories":null,"date":"Mon, 17 Jan 2022 14:45:44 GMT","updated":"Sat, 08 Jul 2023 10:41:50 GMT","coverImg":null,"dateYMD":"2022-01-17","wordcount":"本文字数：110 字    阅读完需：约 1 分钟"},{"id":"article-14","markdown":"## 简介\n由于audio标签原生样式不能满足项目需要，需要自定义样式，项目使用技术为vue，将自定义audio封装为一个组件，可以在其他组件内进行引用,主要进行了以下修改：\n1、隐藏原生audio标签\n2、通过div实现自定义样式\n3、控制div操作audio 对象的属性和方法\naudio原生样式⬇⬇⬇\n\n![](/public/images/vue+audio//audio.png)\n\n\n自定义audio样式及效果⬇⬇⬇\n![动画.gif](/public/images/vue+audio/audio.gif)\n## 实现代码\n\u003e 父组件内引用自定义audio\n\n```javascript\n\u003ctemplate\u003e\n  \u003cdiv class=\"page\" @click=\"handleChangeAudioVolume\"\u003e\n    \u003caudio-player ref=\"audio\" class=\"audio-box\" fileurl=\"http://music.163.com/song/media/outer/url?id=447925558.mp3\"\u003e\u003c/audio-player\u003e\n  \u003c/div\u003e\n\u003c/template\u003e\n\n\u003cscript\u003e\nimport AudioPlayer from './components/audioPlayer.vue'\nexport default {\n  data() {\n    return {}\n  },\n  components: {\n    AudioPlayer\n  },\n  mounted() {},\n  methods: {\n    handleChangeAudioVolume() {\n      // 点击页面关闭音量键显示\n      if (this.$refs.audio) this.$refs.audio.audioHuds = false\n    }\n  }\n}\n\u003c/script\u003e\n```\n\n\u003e audio自定义组件 audioPlayer.vue\n\n注：播放、音量按钮需要引icon \n```javascript\n\u003ctemplate\u003e\n  \u003cdiv\u003e\n    \u003caudio @timeupdate=\"updateProgress\" controls ref=\"audioRef\" style=\"display: none\"\u003e\n      \u003csource :src=\"fileurl\" type=\"audio/mpeg\" /\u003e\n      您的浏览器不支持音频播放\n    \u003c/audio\u003e\n    \u003cdiv class=\"audio-right\"\u003e\n      \u003ci :class=\"audioStatus !== 'pause' ? 'iconfont icon-bofang' : 'iconfont icon-zanting'\" @click=\"playAudio\" class=\"dialogAudioPlay\"\u003e\u003c/i\u003e\n      \u003cdiv class=\"progress-bar-bg\" id=\"progressBarBg\" v-dragto=\"setAudioIcon\"\u003e\n        \u003cdiv class=\"progress-bar\" id=\"progressBar\"\u003e\u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"audio-time\" style=\"min-height: 10px\"\u003e\n        \u003cspan class=\"audio-length-current\" id=\"audioCurTime\"\u003e{{ audioStart }}\u003c/span\n        \u003e/\n        \u003cspan class=\"audio-length-total\"\u003e{{ duration }}\u003c/span\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"volume\"\u003e\n        \u003cdiv\n          @click.stop=\"\n            () =\u003e {\n              return false\n            }\n          \"\n          class=\"volume-progress\"\n          v-show=\"audioHuds\"\n        \u003e\n          \u003cdiv class=\"volume-bar-bg\" id=\"volumeBarBg\" v-adjuster=\"handleShowMuteIcon\"\u003e\n            \u003cdiv class=\"volume-bar\" id=\"volumeBar\"\u003e\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003ci class=\"iconfont pl-1\" :class=\"audioIcon\" @click.stop=\"audioHuds = !audioHuds\"\u003e \u003c/i\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/template\u003e\n\n\u003cscript\u003e\nexport default {\n  props: {\n    fileurl: {\n      trpe: String\n    }\n  },\n  data() {\n    return {\n      audioStatus: 'play',\n      audioStart: '0:00',\n      duration: '0:00',\n      audioVolume: 0.5,\n      audioHuds: false\n    }\n  },\n\n  directives: {\n    dragto: {\n      inserted: function (el, binding, vnode) {\n        el.addEventListener(\n          'click',\n          (e) =\u003e {\n            let wdiv = document.getElementById('progressBarBg').clientWidth\n            let audio = vnode.context.$refs.audioRef\n            // 只有音乐开始播放后才可以调节，已经播放过但暂停了的也可以\n            let ratemin = e.offsetX / wdiv\n            let rate = ratemin * 100\n            document.getElementById('progressBar').style.width = rate + '%'\n            audio.currentTime = audio.duration * ratemin\n            audio.play()\n            binding.value()\n          },\n          false\n        )\n      }\n    },\n    adjuster: {\n      inserted: function (el, binding, vnode) {\n        el.addEventListener(\n          'click',\n          (e) =\u003e {\n            let hdiv = document.getElementById('volumeBarBg').clientHeight\n            let audio = vnode.context.$refs.audioRef\n            // 只有音乐开始播放后才可以调节，已经播放过但暂停了的也可以\n            let ratemin = e.offsetY / hdiv\n            let rate = ratemin * 100\n            document.getElementById('volumeBar').style.height = rate + '%'\n            audio.volume = ratemin\n            binding.value(rate / 100)\n          },\n          false\n        )\n      }\n    }\n  },\n  computed: {\n    audioIcon() {\n      if (this.audioHuds) {\n        return this.audioVolume \u003c 0.01 ? 'checked icon-jingyin' : 'checked icon-shengyin'\n      } else {\n        return 'icon-shengyin'\n      }\n    }\n  },\n  mounted() {\n    this.fetch()\n  },\n  methods: {\n    fetch() {\n      let that = this\n      var myVid = this.$refs.audioRef\n      myVid.loop = false\n      // 监听音频播放完毕\n      myVid.addEventListener(\n        'ended',\n        function () {\n          that.audioStatus = 'play' // 显示播放icon\n          document.getElementById('progressBar').style.width = '0%' // 进度条初始化\n        },\n        false\n      )\n      if (myVid != null) {\n        myVid.oncanplay = function () {\n          that.duration = that.transTime(myVid.duration) // 计算音频时长\n        }\n        myVid.volume = 0.5 // 设置音量50%\n      }\n    },\n    // 播放暂停控制\n    playAudio() {\n      let recordAudio = this.$refs.audioRef // 获取audio元素\n      if (recordAudio.paused) {\n        recordAudio.play()\n        this.audioStatus = 'pause'\n      } else {\n        recordAudio.pause()\n        this.audioStatus = 'play'\n      }\n    },\n    // 更新进度条与当前播放时间\n    updateProgress(e) {\n      var value = e.target.currentTime / e.target.duration\n      if (document.getElementById('progressBar')) {\n        document.getElementById('progressBar').style.width = value * 100 + '%'\n        if (e.target.currentTime === e.target.duration) {\n          this.audioStatus = 'pause'\n        }\n      } else {\n        this.audioStatus = 'pause'\n      }\n\n      this.audioStart = this.transTime(this.$refs.audioRef.currentTime)\n    },\n    /**\n     * 音频播放时间换算\n     * @param {number} value - 音频当前播放时间，单位秒\n     */\n    transTime(time) {\n      var duration = parseInt(time)\n      var minute = parseInt(duration / 60)\n      var sec = (duration % 60) + ''\n      var isM0 = ':'\n      if (minute === 0) {\n        minute = '00'\n      } else if (minute \u003c 10) {\n        minute = '0' + minute\n      }\n      if (sec.length === 1) {\n        sec = '0' + sec\n      }\n      return minute + isM0 + sec\n    },\n    setAudioIcon() {\n      this.audioStatus = 'pause'\n    },\n    handleShowMuteIcon(val) {\n      this.audioVolume = val\n    }\n  }\n}\n\u003c/script\u003e\n\n\u003cstyle lang=\"scss\"  scoped\u003e\n.volume {\n  position: relative;\n  .volume-progress {\n    position: absolute;\n    top: -150px;\n    width: 32px;\n    height: 140px;\n    background: #f6f6f6;\n    border-radius: 4px;\n    padding-top: 10px;\n  }\n  .volume-bar-bg {\n    margin: 0 auto;\n    width: 6px;\n    height: 120px;\n    background: #dcdcdc;\n    border-radius: 100px;\n    flex: 1;\n    position: relative;\n    transform: rotate(180deg);\n    cursor: pointer;\n    .volume-bar {\n      width: 6px;\n      height: 50%;\n      background: #56bf8b;\n      border-radius: 100px;\n    }\n  }\n  .checked {\n    color: #56bf8b;\n  }\n}\n.audio-right {\n  width: 100%;\n  height: 49px;\n  line-height: 49px;\n  background: #f6f6f6;\n  border-radius: 6px;\n  display: flex;\n  padding: 0 15px;\n  .dialogAudioPlay {\n    cursor: pointer;\n    color: #5c5e66;\n    font-size: 20px;\n  }\n  .progress-bar-bg {\n    background-color: #fff;\n    flex: 1;\n    position: relative;\n    height: 10px;\n    top: 50%;\n    transform: translateY(-50%);\n    margin-top: -1px;\n    cursor: pointer;\n    margin: 0 10px;\n  }\n  .progress-bar {\n    background-color: #56bf8b;\n    width: 0%;\n    height: 10px;\n    border-radius: 5px;\n  }\n\n  .audio-time {\n    overflow: hidden;\n    font-size: 14px;\n    .audio-length-total {\n      float: right;\n    }\n    .audio-length-current {\n      float: left;\n    }\n  }\n}\n\u003c/style\u003e\n\n```\n","title":"vue自定义音频audio样式及操作面板","summary":null,"tags":["javascript","Vue","CSS3"],"categories":null,"date":"Tue, 11 Jan 2022 13:15:32 GMT","updated":"Sat, 08 Jul 2023 10:50:28 GMT","coverImg":null,"dateYMD":"2022-01-11","wordcount":"本文字数：670 字    阅读完需：约 4 分钟"},{"id":"article-15","markdown":"### 第一步、安装vuecli\n- 如果你之前没有装vuecli，可以直接执行下面命令\n\n```bash\nnpm install --global @vue/cli\n```\n\n如果之前装了vuecli的版本的，操作第一步之前需要先uninstall之前的版本\n\n``` bash\nnpm uninstall vue-cli -g // 卸载\n```\n\n安装完成后，版本查看\n```bash\nvue -V\n```\n我安装的是4.15.4\n![image.png](/public/images/vue+vite/cli.png)\n\n### 第二步、创建vue项目\n- 创建vue项目脚手架\n\n``` bash\nvue create my-ts-vue // my-ts-vue 项目名\n```\n\n- 选择创建模式，如图我们选择手动选择配置（前两项默认创建，需要手动添加route、vuex、css预编译等）\n\n![image.png](/public/images/vue+vite/npm-01.png)\n\n- 手动选择特性（上下箭头移动，空格选择，回车完成）\n\n![image.png](/public/images/vue+vite/npm-02.png)\n\n- 选择vue版本，此处选择3.x\n\n![image.png](/public/images/vue+vite/npm-03.png)\n\n- 接下来是一些配置的选择，（y-是，n-否）\n\n1. 是否使用类样式组件语法？选择y\n\n ![image.png](/public/images/vue+vite/npm-04.png)\n\n2.是否将babel与typescript一起使用？选择y\n\n ![image.png](/public/images/vue+vite/npm-05.png)\n\n3.路由是否使用history模式（默认hash模式）？选择y\n\n![image.png](/public/images/vue+vite/npm-06.png)\n\n4.选择css预编译方式，我选的是Sass/SCSS (with node-sass)\n\n![image.png](/public/images/vue+vite/npm-07.png)\n\n5.选择一个语法检测配置，选择TSLint\n\n![image.png](/public/images/vue+vite/npm-08.png)\n\n6.选择语法检查方式，选择Lint on save\n\n![image.png](/public/images/vue+vite/npm-09.png)\n\n7.你希望babel、postcss、eslint等的配置文件放在哪？选择In dedicated config files\n\n![image.png](/public/images/vue+vite/npm-10.png)\n\n8.将此保存为将来项目的预设？随意选，我选的n\n\n![image.png](/public/images/vue+vite/npm-11.png)\n\n以上所有配置都选择完毕，下载依赖，推荐使用cnpm，不然下载真的太慢了！！\n\n- 最后npm run serve运行项目\n\n![image.png](/public/images/vue+vite/npm-12.png)\n","title":"vue-cli4+ts建立vue项目","summary":null,"tags":["vue","typeScript"],"categories":null,"date":"Thu, 02 Dec 2021 15:27:56 GMT","updated":"Sat, 08 Jul 2023 10:56:57 GMT","coverImg":null,"dateYMD":"2021-12-02","wordcount":"本文字数：200 字    阅读完需：约 1 分钟"},{"id":"article-16","markdown":"在利用element-ui Table编写项目时,会存在表格展示的数据存在分页的情况,基本每个页面都要配置，很影响开发效率，也不利于后期维护，所以统一封装一下，便于开发使用。\n![image.png](/public/images/element/table.png)\n\u003e ## How to Use: \n\n在`src/components`目录中创建`base-table`，引用到自己的页面中，可以根据自己的需求自由更改。\n\u003e ## base-table组件封装\n```\n\u003ctemplate\u003e\n  \u003cdiv class=\"base-table bg-white\"\u003e\n    \u003c!-- 表格上方操作栏 ，插槽actionBar，配置操作按钮--\u003e\n    \u003cdiv class=\"table-title flex justify-between align-center\"\u003e\n      \u003cdiv class=\"font-sm\"\u003e{{ tableTitle }}\u003c/div\u003e\n      \u003cslot name=\"actionBar\"\u003e\u003c/slot\u003e\n    \u003c/div\u003e\n    \u003cel-table\n      :span-method=\"arraySpanMethod\"\n      v-loading=\"loading\"\n      :element-loading-text=\"$t('tips.loading')\"\n      element-loading-spinner=\"el-icon-loading\"\n      element-loading-background=\"rgba(255, 255, 255, 0.8)\"\n      :header-row-class-name=\"tableHeader\"\n      :header-cell-style=\"{ background: '#E3E3E3', color: '#333333' }\"\n      :row-class-name=\"tabRowClassName\"\n      @selection-change=\"handleCustomSelect\"\n      ref=\"table\"\n      row-key=\"id\"\n      :tree-props=\"{ children: 'children', hasChildren: 'hasChildren' }\"\n      :data=\"tableData\"\n      :rowArr=\"rowSpanArr\"\n      style=\"width: 100%\"\n      :border=\"border\"\n    \u003e\n      \u003cel-table-column v-if=\"selection\" type=\"selection\" width=\"55\"\u003e \u003c/el-table-column\u003e\n      \u003cel-table-column v-for=\"item of labelData\" :min-width=\"item.minWidth\" :width=\"item.width\" :label=\"item.label\" :fixed=\"item.fixed\" :align=\"item.align || 'center'\" :key=\"item.id\"\u003e\n        \u003ctemplate slot-scope=\"scope\"\u003e\n          \u003cel-tooltip class=\"item\" effect=\"dark\" :disabled=\"!scope.row.showTooltip\" v-model=\"scope.row.showTooltip\" :content=\"scope.row[item.prop]\" placement=\"bottom-start\"\u003e\n            \u003cdiv @mouseenter=\"showTips($event, scope.row, scope.index, item.prop)\" class=\"cell-word\"\u003e{{ scope.row[item.prop] }}\u003c/div\u003e\n          \u003c/el-tooltip\u003e\n        \u003c/template\u003e\n      \u003c/el-table-column\u003e\n      \u003cslot\u003e\u003c/slot\u003e\n    \u003c/el-table\u003e\n    \u003cdiv class=\"table-bottom\"\u003e\n      \u003cel-pagination\n        v-if=\"pagi\"\n        @size-change=\"handleSelectionChan
