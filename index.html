ge\"\n        @current-change=\"getCurrentPage\"\n        layout=\"total, sizes, prev, pager, next\"\n        :page-sizes=\"pageSizeArr\"\n        :page-size=\"pageSize\"\n        :current-page.sync=\"tableCurrentPage\"\n        :total=\"counts\"\n      \u003e\n      \u003c/el-pagination\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/template\u003e\n\n\u003cscript\u003e\nexport default {\n  name: 'baseTable',\n  props: {\n    loading: Boolean,\n    tableData: Array,\n    labelData: Array,\n    rowSpanArr: Array,\n    pagi: Boolean,\n    counts: Number,\n    currentPage: Number,\n    selection: Boolean,\n    isIndex: Boolean,\n    tableTitle: String,\n    border: {\n      type: Boolean,\n      default: true\n    },\n    merge: {\n      type: Boolean,\n      default: false\n    },\n    mergeCells: {\n      type: Boolean,\n      default: false\n    },\n    index: {\n      type: Number,\n      default: 6\n    }\n  },\n  data() {\n    return {\n      pageSizeArr: [5, 10, 15, 20, 25],\n      pageSize: 10,\n      tableHeader: 'table-header',\n      tableCurrentPage: this.currentPage\n    }\n  },\n  created() {},\n  methods: {\n    /**\n     * @description: 合并行或列的计算方法\n     * @param {*} row 当前行\n     * @param {*} column 当前列\n     * @param {*} rowIndex 当前行号\n     * @param {*} columnIndex 当前列号\n     */\n    arraySpanMethod({ row, column, rowIndex, columnIndex }) {\n      if (this.merge) {\n        // 只合并区域位置\n        if (columnIndex === 0) {\n          const _row = this.rowSpanArr[rowIndex]\n          return {\n            rowspan: _row, // 行\n            colspan: 1 // 列\n          }\n        }\n      }\n      if (this.mergeCells) {\n        // 只合并区域位置\n        if (columnIndex === 0) {\n          if (rowIndex % this.index === 0) {\n            return {\n              rowspan: 6,\n              colspan: 1\n            }\n          } else {\n            return {\n              rowspan: 0,\n              colspan: 0\n            }\n          }\n        }\n      }\n      // this.$emit('arraySpanMethod',{ row, column, rowIndex, columnIndex })\n    },\n    /**\n     * @description: 用于多选表格，切换某一行的选中状态，如果使用了第二个参数，则是设置这一行选中与否\n     * @param {*} row 当前行\n     */\n    handleCustomSelect(row) {\n     \tthis.$emit('selection-change', row)\n    },\n    /**\n     * @description: 通过方法计算返回对应class样式\n     * @param {*} row 当前行\n     * @param {*} rowIndex 当前行号\n     * @return {Boolen}\n     */\n    tabRowClassName({ row, rowIndex }) {\n      let index = rowIndex + 1\n      if (index % 2 === 0) {\n        return 'warning-row'\n      }\n    },\n    /**\n     * @description: currentPage 改变时会触发\n     * @param {*} index 跳转页码\n     * @return {*}\n     */\n    getCurrentPage(index) {\n      this.$emit('page-change', index)\n    },\n    /**\n     * @description: pageSize 改变时会触发\n     * @param {*} val  每页条数\n     * @return {*}\n     */\n    handleSelectionChange(val) {\n      this.$emit('size-change', val)\n    },\n    showTips(obj, row, index, prop) {\n      /* obj为鼠标移入时的事件对象 */\n      /* currentWidth 为文本在页面中所占的宽度，创建标签，加入到页面，获取currentWidth ,最后在移除 */\n      let TemporaryTag = document.createElement('span')\n      TemporaryTag.innerText = row[prop]\n      TemporaryTag.className = 'getTextWidth'\n      document.querySelector('body').appendChild(TemporaryTag)\n      let currentWidth = document.querySelector('.getTextWidth').offsetWidth\n      document.querySelector('.getTextWidth').remove()\n\n      /* cellWidth为表格容器的宽度 */\n      const cellWidth = obj.target.offsetWidth\n\n      /* 当文本宽度小于||等于容器宽度两倍时，代表文本显示未超过两行 */\n      currentWidth \u003c= 2 * cellWidth ? (row.showTooltip = false) : (row.showTooltip = true)\n      this.$set(this.tableData, index, row)\n      console.log(currentWidth \u003c= 2 * cellWidth ? (row.showTooltip = false) : (row.showTooltip = true))\n    }\n  },\n  mounted() {},\n  watch: {\n    currentPage() {\n      this.tableCurrentPage = this.currentPage\n    }\n  }\n}\n\u003c/script\u003e\n\n\u003cstyle lang=\"scss\" scoped\u003e\n.base-table {\n  border-radius: 4px;\n  padding: 16px;\n  margin-top: 8px;\n\n  .table-title {\n    margin-bottom: 16px;\n    color: #4c4c4c;\n  }\n  .table-bottom {\n    margin-top: 20px;\n    display: flex;\n    justify-content: center;\n  }\n  /deep/ tr .cell {\n    text-overflow: -o-ellipsis-lastline;\n    overflow: hidden;\n    text-overflow: ellipsis;\n    display: -webkit-box;\n    -webkit-line-clamp: 2;\n    line-clamp: 2;\n    -webkit-box-orient: vertical;\n    word-break: break-all;\n  }\n  .cell-word {\n    cursor: pointer;\n  }\n  /deep/ .warning-row {\n    background-color: #f3f3f3;\n  }\n  /deep/.el-table {\n    .cell {\n      .el-button {\n        margin-bottom: 4px;\n        margin-left: 4px;\n      }\n    }\n  }\n  .spans {\n    margin: 0 6px;\n    display: inline-block;\n    cursor: pointer;\n  }\n}\n\u003c/style\u003e\n```\n\u003e ## 传参说明\n\nTable Attributes\n\n\n|参数|说明|类型|默认值|\n|-|-|-|-|\n|tableTitle|表格上方标题|String|-|\n|tableData|显示的数据|Array|-|\n|labelData|table-column相关配置信息,详见[Table-column Attributes](#column)|Array|-|\n|loading|区域加载效果，在表格等容器中加载数据时显示。|Boolean|-|\n|selection|是否在表格第一列显示多选框|Boolean|-|\n|border|是否显示表格边框|Boolean|true|\n|rowSpanArr|合并行或列的数组 [rowIndex/columnIndex]|Array|-|\n|merge|合并行,配合rowSpanArr使用|Boolean|false|\n|mergeCells|合并列,配合rowSpanArr使用|Boolean|false|\n|pagi|是否显示表格下面的分页|Boolean|-|\n|counts|总条目数|Number|-|\n|currentPage|当前页数，支持 .sync 修饰符|Number|-|\n\nTable Events\n\n|事件名|说明|参数|\n|-|-|-|\n|selection-change|table第一列，多选项发生变化时会触发该事件|selection|\n|page-change|currentPage 改变时会触发|当前页|\n|size-chang|pageSize 改变时会触发|每页条数|\n\n\u003ca name='column'\u003eTable-column Attributes\u003c/a\u003e\n|参数|说明|类型|默认值|\n|-|-|-|-|\n|label|显示的标题|String|-|\n|prop|对应列内容的字段名|String|-|\n|width|对应列的宽度|String|-|\n|fixed|列是否固定在左侧或者右侧，true 表示固定在左侧|string, boolean|-|\n|align|对齐方式|String|center|\n\n\u003e ## 使用模板\n\n需要使用的页面\n```\n // template\n \u003cbase-table\n   tableTitle=\"角色列表\"\n   :label-data=\"tableData.cloumn\"\n   :table-data=\"tableData.data\"\n   :counts=\"count\"\n   pagi\n   selection\n   :loading=\"loading\"\n   @size-change=\"getSelectionChange\"\n   :current-page=\"searchParams.page\"\n   @page-change=\"getCurrentPage\"\n   @selection-change=\"handleselectione\"\n \u003e\n   \u003c!-- 表格头部右侧操作栏 --\u003e\n   \u003ctemplate slot=\"actionBar\"\u003e\n     \u003cel-button type=\"primary\"\u003e新增角色\u003c/el-button\u003e\n   \u003c/template\u003e\n   \u003c!-- 自定义操作列 --\u003e\n   \u003cel-table-column align=\"center\" :label=\"$t('account.actions')\"\u003e\n     \u003ctemplate slot-scope=\"scope\"\u003e\n       \u003cel-button type=\"text\" @click=\"handleEdit(scope.row)\"\u003e编辑\u003c/el-button\u003e\n       \u003cel-button type=\"text\" @click=\"handleDelete(scope.row)\"\u003e删除\u003c/el-button\u003e\n     \u003c/template\u003e\n   \u003c/el-table-column\u003e\n \u003c/base-table\u003e\n \n```\n\n```\nimport BaseTable from '@/components/common/baseTable.vue'\n// data\nexport default {\n  data() {\n    return {\n      loading: true,\n      tableData: {\n        // 表格数据\n        data: [],\n        cloumn: [\n          { label: '角色名称'), prop: 'Name', fixed: true, align: 'left', minWidth: '100px' },\n          { label: '角色明细', prop: 'Description', width: '130px' }\n        ]\n      },\n      searchParams: { // 请求参数\n        page: 1,\n        limit: 10\n      },\n      count: 234 // 列表总数\n    }\n  },\n  components: { BaseTable },\n}\n```\n\n```\n//methods\n    // 请求数据\n    fetch(){},\n\n    // 下拉框选择每页显示条数\n    getSelectionChange(val) {\n      this.searchParams.limit = val\n      this.searchParams.page = 1\n      this.fetch()\n    },\n\n    // 切换分页\n    getCurrentPage(val) {\n      this.searchParams.page = val\n      this.fetch()\n    },\n\n    // 点击选中当前行\n    handleselectione(value) {\n      console.log(value)\n    },\n```\n","title":"基于element封装table、分页","summary":"在利用element-ui Table编写项目时,会存在表格展示的数据存在分页的情况,基本每个页面都要配置，很影响开发效率，也不利于后期维护，所以统一封装一下，便于开发使用。","tags":["Element-ui","Vue","javascript"],"categories":null,"date":"Fri, 05 Nov 2021 14:06:13 GMT","updated":"Sun, 09 Jul 2023 13:06:37 GMT","coverImg":null,"dateYMD":"2021-11-05","wordcount":"本文字数：820 字    阅读完需：约 5 分钟"},{"id":"article-18","markdown":"由于项目需求需要将一维数组转化为树形结构的数组,实现评论数据的展示,所以封装了一个方法去解决\n\u003e 转换后数据格式\n\n```js\n[\n\n  {\n    browserName: \"Chrome\",\n    createTime: \"Fri Oct 29 2021 18:10:50 GMT+0800 (GMT+08:00)\",\n    essayId: \"617bc8018105c4417050bfeb\",\n    osName: \"Windows\",\n    parentId: \"-1\",\n    remark: \"支持的功能会越来越多哟~~\",\n    userName: \"admin\",\n    _id: \"0\",\n  },\n  {\n    browserName: \"Chrome\",\n    createTime: \"Fri Oct 29 2021 18:08:43 GMT+0800 (GMT+08:00)\",\n    essayId: \"617bc8018105c4417050bfeb\",\n    osName: \"Windows\",\n    parentId: \"-1\",\n    remark: \"评论功能上线啦！\",\n    userName: \"admin\",\n    _id: \"1\",\n    children: [\n      {\n        browserName: \"Chrome\",\n        createTime: \"Fri Oct 29 2021 18:09:32 GMT+0800 (GMT+08:00)\",\n        essayId: \"617bc8018105c4417050bfeb\",\n        osName: \"Windows\",\n        parentId: \"1\",\n        remark: \"good！！！\",\n        replyTo: \"admin\",\n        userName: \"test\",\n        _id: \"1-1\",\n      },\n      {\n        browserName: \"Chrome\",\n        createTime: \"Fri Oct 29 2021 18:09:55 GMT+0800 (GMT+08:00)\",\n        essayId: \"617bc8018105c4417050bfeb\",\n        osName: \"Windows\",\n        parentId: \"1\",\n        remark: \"畅所欲言\",\n        replyTo: \"test\",\n        userName: \"用户123\",\n        _id: \"1-2\",\n      }\n    ]\n  }\n]\n```\n\u003e 实现方法\n\n```js\n// 原数组\nlet arr = [\n\n  {\n    browserName: \"Chrome\",\n    createTime: \"Fri Oct 29 2021 18:10:50 GMT+0800 (GMT+08:00)\",\n    essayId: \"617bc8018105c4417050bfeb\",\n    osName: \"Windows\",\n    parentId: \"-1\",\n    remark: \"支持的功能会越来越多哟~~\",\n    userName: \"admin\",\n    _id: \"0\",\n  },\n  {\n    browserName: \"Chrome\",\n    createTime: \"Fri Oct 29 2021 18:08:43 GMT+0800 (GMT+08:00)\",\n    essayId: \"617bc8018105c4417050bfeb\",\n    osName: \"Windows\",\n    parentId: \"-1\",\n    remark: \"评论功能上线啦！\",\n    userName: \"admin\",\n    _id: \"1\",\n  },\n  {\n    browserName: \"Chrome\",\n    createTime: \"Fri Oct 29 2021 18:09:32 GMT+0800 (GMT+08:00)\",\n    essayId: \"617bc8018105c4417050bfeb\",\n    osName: \"Windows\",\n    parentId: \"1\",\n    remark: \"good！！！\",\n    replyTo: \"admin\",\n    userName: \"test\",\n    _id: \"1-1\",\n  },\n  {\n    browserName: \"Chrome\",\n    createTime: \"Fri Oct 29 2021 18:09:55 GMT+0800 (GMT+08:00)\",\n    essayId: \"617bc8018105c4417050bfeb\",\n    osName: \"Windows\",\n    parentId: \"1\",\n    remark: \"畅所欲言\",\n    replyTo: \"test\",\n    userName: \"用户123\",\n    _id: \"1-2\",\n  }\n]\n\n// 转换方法\nfunction buildTree(array, id_key, parentId_key){\n  let result = []\n  if (!Array.isArray(array)) {\n    return result\n  }\n  array.forEach(item =\u003e {\n    delete item.children;\n  });\n  let map = {};\n  array.forEach(item =\u003e {\n    map[item[id_key]] = item;\n  });\n  array.forEach(item =\u003e {\n    let parent = map[item[parentId_key]];\n    if (parent) {\n      (parent.children || (parent.children = [])).push(item);\n    } else {\n      result.push(item);\n    }\n  });\n  return result;\n}\n\nlet tree2 = buildTree(arr, '_id', 'parentId');\nconsole.log(tree2);\n```\n","title":"js数组转化为树形结构","summary":"由于项目需求需要将一维数组转化为树形结构的数组,实现评论数据的展示,所以封装了一个方法去解决","tags":["javascript"],"categories":null,"date":"Mon, 01 Nov 2021 10:58:38 GMT","updated":"Sun, 09 Jul 2023 13:17:46 GMT","coverImg":null,"dateYMD":"2021-11-01","wordcount":"本文字数：290 字    阅读完需：约 2 分钟"},{"id":"article-17","markdown":"User Agent中文名为用户代理，简称 UA，它是一个特殊字符串头，使得服务器能够识别客户使用的操作系统及版本、CPU 类型、浏览器及版本、浏览器渲染引擎、浏览器语言、浏览器插件等。\n- js可以通过 navigator.userAgent 拿到当前浏览器与操作系统的信息\n![image.png](/public/images/node/UserAgent.png)\n- node.js通过header信息获取\n\n``` js\nlet http = require(`http`);\n\nhttp.createServer((req, res) =\u003e {\n\n    console.log(req.headers[`user-agent`]);\n\n    res.end();\n    \n}).listen(6666);\n```\n\n![image.png](http://blog.lhzzs.top/uploads/9104f244a32d1f37a958e9c3c42e5215)\n可以通过ua信息看到用户当前操作系统为windows10 64位系统，浏览器为Chrome，浏览器版本为95.0.4638.54\n浏览器种类繁杂，罗列几个常见操作系统+浏览器的ua\n\n``` js\n// windows 7 + Chrome\nMozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/535.1 (KHTML, like Gecko) Chrome/14.0.835.163 Safari/535.1\n\n// windows 7 + FireFox\nMozilla/5.0 (Windows NT 6.1; WOW64; rv:6.0) Gecko/20100101 Firefox/6.0\n\n// windows 7 + Opera\nOpera/9.80 (Windows NT 6.1; U; zh-cn) Presto/2.9.168 Version/11.50\n\n// window 7 + IE 9 \nMozilla/5.0 (compatible; MSIE 9.0; Windows NT 6.1; Win64; x64; Trident/5.0; .NET CLR 2.0.50727; SLCC2; .NET CLR 3.5.30729; .NET CLR 3.0.30729; Media Center PC 6.0; InfoPath.3; .NET4.0C; Tablet PC 2.0; .NET4.0E)\n\n// 360\nUser-Agent: Mozilla/4.0 (compatible; MSIE 7.0; Windows NT 5.1; 360SE)\n```\n\n根据上面的ua信息，我们可以将一些关键信息提取出来，最终输出一个包含浏览器名称、浏览器版本、操作系统名称、操作系统版本、设备名称（安卓设备）的对象，以供后续的需求使用\n\n``` js\n// 获取用户平台\u0026浏览器信息\nlet browserReg = {\n  Chrome: /Chrome/,\n  IE: /MSIE/,\n  Firefox: /Firefox/,\n  Opera: /Presto/,\n  Safari: /Version\\/([\\d.]+).*Safari/,\n  '360': /360SE/,\n  QQBrowswe: /QQ/,\n}\n\nlet deviceReg = {\n  iPhone: /iPhone/,\n  iPad: /iPad/,\n  Android: /Android/,\n  Windows: /Windows/,\n  Mac: /Macintosh/,\n}\n\nexport default () =\u003e {\n  let userAgentStr = navigator.userAgent\n  const userAgentObj = {\n    browserName: '',    // 浏览器名称\n    browserVersion: '', // 浏览器版本\n    osName: '',         // 操作系统名称\n    osVersion: '',      // 操作系统版本\n    deviceName: '',     // 设备名称\n  }\n\n  for(let key in browserReg) {\n    if(browserReg[key].test(userAgentStr)) {\n      userAgentObj.browserName = key\n      if(key === 'Chrome') {\n        userAgentObj.browserVersion = userAgentStr.split('Chrome/')[1].split(' ')[0]\n      } else if(key === 'IE') {\n        userAgentObj.browserVersion = userAgentStr.split('MSIE ')[1].split(' ')[1]\n      } else if(key === 'Firefox') {\n        userAgentObj.browserVersion = userAgentStr.split('Firefox/')[1]\n      } else if(key === 'Opera') {\n        userAgentObj.browserVersion = userAgentStr.split('Version/')[1]\n      } else if(key === 'Safari') {\n        userAgentObj.browserVersion = userAgentStr.split('Version/')[1].split(' ')[0]\n      } else if(key === '360') {\n        userAgentObj.browserVersion = ''\n      } else if(key === 'QQBrowswe') {\n        userAgentObj.browserVersion = userAgentStr.split('Version/')[1].split(' ')[0]\n      }\n    }\n  }\n\n  for(let key in deviceReg){\n    if(deviceReg[key].test(userAgentStr)){\n      userAgentObj.osName = key\n      if(key === 'Windows'){\n        userAgentObj.osVersion = userAgentStr.split('Windows NT ')[1].split(';')[0]\n      } else if(key === 'Mac') {\n        userAgentObj.osVersion = userAgentStr.split('Mac OS X ')[1].split(')')[0]\n      } else if(key === 'iPhone') {\n        userAgentObj.osVersion = userAgentStr.split('iPhone OS ')[1].split(' ')[0]\n      } else if(key === 'iPad') {\n        userAgentObj.osVersion = userAgentStr.split('iPad; CPU OS ')[1].split(' ')[0]\n      } else if(key === 'Android') {\n        userAgentObj.osVersion = userAgentStr.split('Android ')[1].split(';')[0]\n        userAgentObj.deviceName = userAgentStr.split('(Linux; Android ')[1].split('; ')[1].split(' Build')[0]\n      }\n    }\n  }\n  \n  return userAgentObj\n}\n```","title":"node \u0026 JavaScript 通过UserAgent获取用户设备信息","summary":"User Agent中文名为用户代理，简称 UA，它是一个特殊字符串头，使得服务器能够识别客户使用的操作系统及版本、CPU 类型、浏览器及版本、浏览器渲染引擎、浏览器语言、浏览器插件等。","tags":["javascript","node.js"],"categories":null,"date":"Mon, 01 Nov 2021 13:12:24 GMT","updated":"Sun, 09 Jul 2023 13:09:27 GMT","coverImg":null,"dateYMD":"2021-11-01","wordcount":"本文字数：410 字    阅读完需：约 3 分钟"},{"id":"article-19","markdown":"## 背景介绍\n公司项目做国际化，使用vue-i18n实现，运营或产品会给到很多对应的Excel版的多语言包，而前端使用时则需要转换成语言包zh.js/en.js等。一个一个文件手动处理显然是不现实的，只要写在excel里，然后用node.js导出我们需要的语言包就可以了，可以大大节省我们的开发时间，减少出错率。\n## 基础准备\n- node.js环境\n- node-xlsx依赖包\n- Node.js API\n\t- fs.writeFile\n\t- fs.stat\n\t- fs.mkdir\n\t- util.inspect\n## 测试数据\n这是模拟的多语言 Excel 文件，注意第一列是根据最终语言包的格式自己添加上去的，第一行的表格头中 % 也是自己添加的，主要是用来生成对应的 JS 文件名![exceltemplate.png](/public/images/node/excel.png)\n这是最终生成的 JS 文件![lantemplate.png](/public/images/node/i18n.png)\n## 开始\n##  初始化环境\n创建一个文件夹并初始化 Node.js 项目\n``` bash\nnpm init -y\n```\n安装node-xlsx依赖包\n``` bash\nnpm install node-xlsx --save\n```\n\n## 主代码逻辑\n\n``` js\nconst fs = require('fs');\nconst path = require('path');\nconst util = require('util');\nconst xlsx = require('node-xlsx');\n \nconst sheets = xlsx.parse('./file/langes.xlsx');\n/**\n * sheets是一个数组，数组中的每一项对应 langes.xlsx 这个文件里的多个表格\n * 如sheets[0]对应 Sheet1 这个表格\n * sheets[1]对应 Sheet2 这个表格\n */\nconst sheet = sheets[0]; // 我们这里只取第一个表\nconst filePath = './lang' // 多语言生成后会存放在此目录下\n \nlet obj = {}\nconst col = sheet['data'][0] // 表格中的第一行，用来获取多语言名称以生成对应的 js 文件\n \nfor (let j = 3; j \u003c col.length; j++) {\n    // sheet 是一个 json 对象，格式为{name:\"Sheet1\",data:[]}，我们想要的数据就存储在data里\n    let key = ''\n \n    // i 对应 excel 文件里的行，根据自己的表格修改\n    for (let i = 1; i \u003c sheet[\"data\"].length; i++) {\n        let row = sheet['data'][i];\n \n        if (row \u0026\u0026 row.length \u003e 0) {\n            let title = row[0].split('.')\n            // 获取表格中的一级模块和二级模块\n            if (title.length \u003e 1) {\n                key = title[0]\n                key2 = title[1]\n            } else {\n                key2 = title[0]\n            }\n \n            !obj[key] \u0026\u0026 (obj[key] = {})\n \n            obj[key][key2] = row[j]\n        }\n    }\n    const fileName = col[j].split('%')[1]\n \n    creatFile(obj, fileName)\n}\n \n/**\n* 将数据写入文件\n* @param {string} 要写入的内容\n* @param {string} 要保存的文件名\n*/\nasync function creatFile(con, name) {\n    const str = 'export default '\n    // con 中的内容如果不处理的话写入文件后会显示成 [object Object]\n    const data = util.inspect(con, { showHidden: false, depth: null })\n    const isExists = await getStat(filePath) // 判断路径是否存在\n    if (!isExists) {\n        await mkdir(filePath) // 创建文件目录\n    }\n    const file = path.join(filePath, name + '.js')\n    fs.writeFile(file, str + data, (err) =\u003e {\n        if (err) throw err;\n        console.log(name + ' 保存成功！');\n    });\n}\n \n/**\n * 判断目录是否存在\n *  @param {string} dir 目录\n */\nfunction getStat(dir) {\n    return new Promise((resolve, reject) =\u003e {\n        fs.stat(dir, (err, stats) =\u003e {\n            if (err) {\n                resolve(false)\n            } else {\n                resolve(stats)\n            }\n        })\n    })\n}\n \n/**\n * 创建文件夹\n * @param {string} dir 要创建的文件夹路径\n */\nfunction mkdir(dir) {\n    return new Promise((resolve, reject) =\u003e {\n        fs.mkdir(dir, (err) =\u003e {\n            if (err) {\n                resolve(false)\n            } else {\n                resolve(true)\n            }\n        })\n    })\n}\n```\n\n在命令行中执行如下命令\n\n``` bash\nnode app.js\n```\n查看 lang 文件夹下是否生成对应的文件。\n\n如果手动创建了多语言文件夹的话，上面代码中两个函数 getStat，mkdir可以省略，然后修改 creatFile 函数为如下代码即可：\n``` js\nfunction creatFile(con, name) {\n    const str = 'export default '\n    // con 中的内容如果不处理的话写入文件后会显示成 [object Object]\n    const data = util.inspect(con, { showHidden: false, depth: null })\n    // 以下代码删除\n    // const isExists = await getStat(filePath) // 判断路径是否存在\n    // if (!isExists) {\n    //     await mkdir(filePath) // 创建文件目录\n    // }\n    const file = path.join(filePath, name + '.js')\n    fs.writeFile(file, str + data, (err) =\u003e {\n        if (err) throw err;\n        console.log(name + ' 保存成功！');\n    });\n}\n```\n","title":"国际化语言包：excel-to-js","summary":"公司项目做国际化，使用vue-i18n实现，运营或产品会给到很多对应的Excel版的多语言包，而前端使用时则需要转换成语言包zh.js/en.js等。一个一个文件手动处理显然是不现实的，只要写在excel里，然后用node.js导出我们需要的语言包就可以了，可以大大节省我们的开发时间，减少出错率。","tags":["javascript","Vue","Element-ui","node.js"],"categories":null,"date":"Mon, 25 Oct 2021 16:06:44 GMT","updated":"Sun, 09 Jul 2023 13:20:59 GMT","coverImg":null,"dateYMD":"2021-10-25","wordcount":"本文字数：340 字    阅读完需：约 2 分钟"},{"id":"article-21","markdown":"## call函数实现步骤\n- 判断调用对象是否为函数，即使定义在函数的原型上的\n- ，但是可能出现使用call等方式调用的情况。\n- 判断传入上下文对象是否存在，如果不存在，则设置为window\n- 处理传入的参数，截取第一个参数后的所有参数。\n- 将函数作为上下文对象的一个属性。\n- 使用上下文对象来调用这个方法，并保存返回结果。\n- 删除刚才新增的属性。\n- 返回结果\n``` js\nFunction.prototype.myCall(context){\n\t// 判断调用的对象是否为函数\n\tif(typeof this !== 'function'){\n\t\tthrow new TypeError('Error')\n\t}\n\t// 判断context（传入上下文对象）是否存在，如果不存在，则设置为window\n\tcontext = context || window\n\t// 获取参数\n\tlet args = [...arguments].slice(1),\n\tresult = null\n\t// 将调用函数设置为对象的方法\n\tcontext.fn = this\n\t// 调用函数\n\tresult = arguments.length \u003e 1 ? context.fn(...args) : context.fn()\n\t// 删除属性\n\tdelete context.fn\n\treturn result\n}\n```\n\n## apply函数实现步骤\n- 判断调用对象是否为函数，即使定义在函数的原型上，但是可能出现使用call等方式调用的情况。\n- 判断传入上下文对象是否存在，如果不存在则设为window。\n- 将函数作为上下文对象的一个属性。\n- 判断参数值是否传入。\n- 使用上下文对象来调用这个方法，并保存返回结果。\n- 删除刚才的新增属性。\n- 返回结果\n``` js\nFunction.prototype.myApply(context){\n\t// 判断调用的对象是否为函数\n\tif(typeof this !== 'function'){\n\t\tthrow TypeError('Error')\n\t}\n\tlet result = null\n\t// 判断context（传入上下文对象）是否存在，如果不存在，则设置为window\n\tcontext = context || window\n\t// 将调用函数设置为对象的方法\n\tcontext.fn = this\n\t// 调用函数\n\tresult = arguments[1] ? context.fn(...arguments[1]) : context.fn()\n\t// 删除属性\n\tdelete context.fn\n\treturn result\n}\n```\n## bind函数实现步骤\n- 判断调用对象是否为函数，即使是定义在函数原型上的，但也可能出现使用call等方式调用的情况。\n- 保存当前函数的引用，获取其余传入参数值。\n- 创建一个函数返回。\n- 函数内部使用apply来绑定函数调用，需要判断函数作为构造函数的情况，这个时候需要传入当前函数的this给apply调用，其余情况都传入指定的上下文对象。\n\n``` js\nFunction.prototype.myBind(context){\n\t// 判断调用的对象是否为函数\n\tif(typeof this !== 'function'){\n\t\tthrow TypeError('Error')\n\t}\n\t// 获取参数\n\tlet args = [...argumrnts].slice(1)\n\tlet  fn = this\n\treturn function Fn(){\n\t\t// 根据调用方式，传入不同绑定值\n    \t\treturn fn.apply(\n      \t\t\tthis instanceof Fn ? this : context,\n     \t\t\targs.concat(...arguments)\n    \t\t);\n\t}\n}\n\n```\n总结：\n这三个方法都可以更改函数的this指向。\napply方法接收两个参数：第一个是this绑定的对象、第二个是参数是一个带下标的集合，可以为数组或者类数组。\ncall方法接收的参数，第一个是this绑定的对象，后面的其余参数是传入函数执行的参数。\nbind方法通过传入一个对象，返回一个this绑定了对象的新函数，这个函数的this指向除了使用new时会改变，其他情况下都不会改变。","title":"实现call、apply以及bind函数","summary":null,"tags":["javascript"],"categories":null,"date":"Sat, 18 Sep 2021 19:04:46 GMT","updated":"Sun, 09 Jul 2023 13:30:04 GMT","coverImg":null,"dateYMD":"2021-09-18","wordcount":"本文字数：140 字    阅读完需：约 1 分钟"},{"id":"article-20","markdown":"# vue实现一键复制\n![image.png](/public/images/vue/copy.png)\n在项目中为了更好的完善体验，需要有一个一键复制的功能，主要的实现方法有以下几个：\n## 不使用插件\n\u003e 使用input配合[document.execComman](document.execCommand)方法可以实现；\n\n这个特性已经过时了，它在一些浏览器中仍然可以工作，但不鼓励使用它，因为它可能随时被删除。尽量避免使用它\n``` js\n// 复制input标签中的内容\n\u003ctemplate\u003e\n  \u003cdiv id=\"app\"\u003e\n    输入你需要复制的内容：\u003cinput id=\"copy\" v-model=\"mes\"/\u003e\n   \u003cbutton v-on:click=\"copy()\"\u003e复制\u003c/button\u003e\n  \u003c/div\u003e\n\u003c/template\u003e\n\n\u003cscript\u003e\nexport default {\n  name: 'App',\n  data() {\n    return {\n      mes: ''\n    }\n  },\n  methods: {\n    copy () {\n      //获取input对象\n      var input = document.getElementById('copy')\n      //选中input标签\n      input.select()\n      //执行复制\n      document.execCommand('copy')\n      this.$message.success('success!')\n    },\n  },\n}\n\u003c/script\u003e\n```\n\u003e 复制一些不是标签中的内容时\n\n``` js\n\u003ctemplate\u003e\n  \u003cdiv id=\"app\"\u003e\n   \u003cbutton id=\"copy\" v-on:click=\"copy()\"\u003e复制\u003c/button\u003e\n  \u003c/div\u003e\n\u003c/template\u003e\n\n\u003cscript\u003e\nexport default {\n  name: 'App',\n  data() {\n    return {\n      mes: '这就是需要复制的内容！'\n    }\n  },\n  methods: {\n    copy () {\n      //创建input标签\n      var input = document.createElement('input')\n      //将input的值设置为需要复制的内容\n      input.value = this.mes;\n      //添加input标签\n      document.body.appendChild(input)\n      //选中input标签\n      input.select()\n      //执行复制\n      document.execCommand('copy')\n      //成功提示信息\n      this.$message.success('success!')\n      //移除input标签\n      document.body.removeChild(input)\n    },\n  },\n}\n\u003c/script\u003e\n```\n\n## 使用插件（Clipboard）\n\n1、在项目目录下安装插件\n``` bash\nnpm install clipboard --save\n```\n2、引入插件\n``` js\n// 全局中引入 main.js\nimport clipboard from 'clipboard'\nVue.prototype.clipboard = clipboard\n\n// 局部引入\nimport clipboard from 'clipborad'\n```\n3、项目中使用\n``` js\n\u003ctemplate\u003e\n  \u003cdiv id=\"app\"\u003e\n   \u003cbutton id=\"copy\" :data-clipboard-text=\"mes\" v-on:click=\"copy()\"\u003e复制\u003c/button\u003e\n  \u003c/div\u003e\n\u003c/template\u003e\n\n\u003cscript\u003e\nimport Clipboard from 'clipboard'\nexport default {\n  name: 'App',\n  data() {\n    return {\n      mes: '这就是需要复制的内容！'\n    }\n  },\n  methods: {\n    copy () {\n      let _this = this\n      let clipborad = new Clipboard('#copy')\n      //复制成功\n      clipborad.on('success', function() {\n        _this.$message.success('复制成功！')\n\t// 释放内存，如果缺少，复制成功的提示会一直累加\n        clipborad.destroy()\n      })\n      //复制失败\n      clipborad.on('error', function() {\n        _this.$message.error('复制失败！')\n\t// 释放内存\n        clipborad.destroy()\n      })\n    },\n  },\n}\n\u003c/script\u003e\n```\n","title":"vue实现一键复制","summary":null,"tags":["Vue","javascript"],"categories":"在项目中为了更好的完善体验，需要有一个一键复制的功能","date":"Sat, 18 Sep 2021 19:04:46 GMT","updated":"Sun, 09 Jul 2023 13:25:50 GMT","coverImg":null,"dateYMD":"2021-09-18","wordcount":"本文字数：210 字    阅读完需：约 2 分钟"},{"id":"article-22","markdown":"## 防抖\n\u003e 事件被触发n秒后开始执行，如果n秒再次触发，则重新计时\n\n#### 非立即执行版本\n*在触发事件后函数 1 秒后才执行，而如果我在触发事件后的 1 秒内又触发了事件，则会重新计算函数执行时间。*\n``` js\nfunction debounce(func,wait){\n\tlet timeout\n\treturn funtion(){\n\t\tlet context = this\n\t\tlet args = argunments\n\t\tif(timeout) clearTimeout(timeout)\n\t\ttimeout = setTimeout(()=\u003e{\n\t\t\tfunc.apply(context,args)\n\t\t},wait)\n\t}\n}\n```\n#### 立即执行版本\n*触发事件后函数会立即执行，然后 n 秒内不触发事件才能继续执行函数的效果。*\n``` js\nfunction debounce(func,wait){\n\tlet timeout\n\treturn function(){\n\t\tlet context = this\n\t\tlet args = argunments\n\t\tif(timeout) clearTimeout(timeout)\n\t\tlet callnow = !timeout\n\t\ttimeout = setTimeout(()=\u003e{\n\t\t\ttimeout = null\n\t\t},wait)\n\t\tif(callnow) func.apply(context,args)\n\t}\n}\n```\n\n## 节流\n\u003e 规定一个时间单位n秒,在n秒内连续多次触发事件，只能有一次执行\n\n#### 时间戳版本\n*在持续触发事件的过程中，函数会立即执行，并且每 1s 执行一次。*\n``` js\nfunction throttle(func,wait){\n\tlet time = 0\n\treturn function(){\n\t\tlet context = this\n\t\tlet args = argunments\n\t\tlet now = Date.now()\n\t\tif(now - time \u003e wait){\n\t\t\tfunc.apply(context,args)\n\t\t\ttime = now\n\t\t}\n\t}\n}\n```\n\n#### 定时器版本\n*在持续触发事件的过程中，函数不会立即执行，并且每 1s 执行一次，在停止触发事件后，函数还会再执行一次。*\n``` js\nfunction throttle(func,wait){\n\tlet timeout\n\treturn function(){\n\t\tlet context = this\n\t\tlet args = argunments\n\t\tif(!timeout){\n\t\t\ttimeout = setTimeout(()=\u003e{\n\t\t\t\ttimeout = null\n\t\t\t\tfunc.apply(func,args)\n\t\t\t},wait)\n\t\t}\n\t}\n}\n```\n","title":"函数节流、防抖","summary":null,"tags":["javascript"],"categories":null,"date":"Thu, 16 Sep 2021 13:32:32 GMT","updated":"Sun, 09 Jul 2023 13:32:22 GMT","coverImg":null,"dateYMD":"2021-09-16","wordcount":"本文字数：130 字    阅读完需：约 1 分钟"},{"id":"article-23","markdown":"访问互联网上的服务时，大多数时，客户端并不是直接访问到服务端的，而是客户端首先请求到反向代理，反向代理再转发到服务端实现服务访问，通过反向代理实现路由/负载均衡等策略。这样在服务端拿到的客户端IP将是反向代理IP，而不是真实客户端IP。我的项目服务器是使用nginx做代理，由于nginx反向代理的问题，所以导致获取出来的ip都是::ffff:127.0.0.1\n\n## 配置Nginx\n``` js\nlocation / {\n　　proxy_set_header Host $http_host;\n　　proxy_set_header X-Real-IP $remote_addr;\n　　proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n　　proxy_pass http://127.0.0.1:8360/;\n}\n\n```\n\n## 通过node.js获取Ip\n``` js\n//获取ip\napp.get(('/admin/api/userIp'),async (req,res,next)=\u003e{\n\t// 获取用户ip\n\tlet ip =  req.headers['x-forwarded-for'] 　||　req.headers['x-real-ip']\n\tif(ip){\n\t    // 拿到ip进行下一步操作\n\t    res.send({ip:ip})\n\t}else{ \n\t    //获取不到时\n\t    res.send(req.ip().substring(req.ip().lastIndexOf(\":\") + 1);)\t\t\n\t}\n}) \n```","title":"nodejs+nginx获取真实ip","summary":null,"tags":["node.js","Nginx"],"categories":null,"date":"Wed, 01 Sep 2021 15:56:00 GMT","updated":"Sun, 09 Jul 2023 13:34:34 GMT","coverImg":null,"dateYMD":"2021-09-01","wordcount":"本文字数：80 字    阅读完需：约 1 分钟"},{"id":"article-25","markdown":"## 1、params\n\n``` ts\n// 路由表中\n\u003cRoute path='/mysort/:id' component={Mysort}\u003e\n\n// Link  HTML方式\n\u003clink to=\"/mysort/12121212\"\u003exxx\u003c/Link\u003e\n\n// js文件中跳转\nthis.props.history.push({pathname:\"/mysort/\" + id});\n\n// Mysort页面读取传递过来的参数（id = 12121212）:\nthis.props.match.params.id\n\n```\n\n优：刷新地址栏参数依旧存在，不会丢失\n劣：只能传递字符串，参数过多时，影响url美观\n\n## 2、query\n注：不需要配置路由表，路由表中的内容照常\n``` ts\n// 路由表中\n\u003cRoute path='/mysort' component={Mysort}/\u003e\n\n// Link  HTML方式\n\u003cLink to={{ path : ' /mysort' , query : { id: '12121212' }}}\u003e\n\n// js文件中跳转\nthis.props.history.push({pathname:\"/mysort\",query: { id: '12121212' }});\n\n// Mysort页面读取传递过来的参数（id = 12121212）:\nthis.props.location.query.id\n\n```\n\n优：传递参数不限于字符串，亦可传递对象\n劣：刷新页面后，地址栏参数会丢失\n\n## 3、state\n注：此传参方式和query差不多，只是属性不一样，而且state传的参数是加密的，query传的参数是公开的，在地址栏\n\n``` ts\n// 路由表中\n\u003cRoute path='/mysort' component={Mysort}/\u003e\n\n// Link  HTML方式\n\u003cLink to={{ path : ' /mysort' , state : { id: '12121212' }}}\u003e \n\n// js文件中跳转\nthis.props.history.push({pathname:\"/mysort\",state : { id: '12121212' }});\n\n// Mysort页面读取传递过来的参数（id = 12121212）:\nthis.props.location.state.id\n\n```\n\n## 4、search\n``` ts\n// 路由表中\n\u003cRoute path='/mysort ' component={Mysort}/\u003e\n\n// Link  HTML方式\n\u003clink to=\"/mysort?id=12121212\"\u003exxx\u003c/Link\u003e\n\n// js文件中跳转\nthis.props.history.push({pathname:\"/mysort?id\" + id});\n\n// Mysort页面读取传递过来的参数（id = 12121212）:\nthis.props.location.search.id\n\n```","title":"React路由传参","summary":null,"tags":["React"],"categories":null,"date":"Mon, 30 Aug 2021 11:34:08 GMT","updated":"Sun, 09 Jul 2023 13:39:00 GMT","coverImg":null,"dateYMD":"2021-08-30","wordcount":"本文字数：150 字    阅读完需：约 1 分钟"},{"id":"article-24","markdown":"在react项目中需要通过监听页面滚动高度，控制页面样式动态展示，所以在网上找了以后其他案例发现监听无效，代码如下：\n\n``` js\n//在componentDidMount，进行scroll事件的注册，绑定一个函数，让这个函数进行监听处理\n componentDidMount() {\n\twindow.addEventListener('scroll', this.handleScroll);\n }\n//在componentWillUnmount，进行scroll事件的注销\ncomponentWillUnmount() {\n        window.removeEventListener('scroll', this.handleScroll);\n}\n\nhandleScroll=(event)=\u003e{\n\tconsole.log('开始滚动了')\n}\n\n``` \n一开始怎么调试都不行，handleScroll事件根本就不会触发，后来查看了[addeventlistener](addEventListener（）) 方法的用法时发现有三个参数，尝试着添加了一下，发现滚动可以触发了\n![image.png](/public/images/Rect/scroll.png)\n\nuseCapture设置为true时候就发现解决了这个问题，修改后代码：\n``` js\n//在componentDidMount，进行scroll事件的注册，绑定一个函数，让这个函数进行监听处理\n componentDidMount() {\n\twindow.addEventListener('scroll', this.handleScroll, true);\n }\n//在componentWillUnmount，进行scroll事件的注销\ncomponentWillUnmount() {\n        window.removeEventListener('scroll', this.handleScroll, true);\n}\n\nhandleScroll=(event)=\u003e{\n\tconsole.log('开始滚动了')\n}\n\n```\n\n最后贴一下获取高度的完整代码，需要的可以看一下\n``` js\n//在componentDidMount，进行scroll事件的注册，绑定一个函数，让这个函数进行监听处理\n componentDidMount() {\n\twindow.addEventListener('scroll', this.handleScroll, true);\n }\n//在componentWillUnmount，进行scroll事件的注销\ncomponentWillUnmount() {\n        window.removeEventListener('scroll', this.handleScroll, true);\n}\n\nhandleScroll=(event)=\u003e{\n\tif (!event.srcElement.scrollTop) {\n\t\t//处理向上使劲滚动的时候scrollTop为undefined\n\t\treturn undefined\n\t}\n\t// 滚动的高度\n\tconst scrollTop =\n\t\t(event.srcElement ? event.srcElement.scrollTop : false) ||\n\t\twindow.pageYOffset ||\n\t\t(event.srcElement ? event.srcElement.body.scrollTop : 0)\n\t// 视窗高度\n\tconst clientHeight = (event.srcElement \u0026\u0026 event.srcElement.clientHeight) || document.body.clientHeight\n\t// 页面高度\n\tconst scrollHeight = (event.srcElement \u0026\u0026 event.srcElement.scrollHeight) || document.body.scrollHeight\n\t// 距离页面底部的高度\n\tconst height = scrollHeight - scrollTop - clientHeight\n\n\treturn height\n}\n```","title":"react监听页面滚动事件：window.addEventListener的scroll无效","summary":"在react项目中需要通过监听页面滚动高度，控制页面样式动态展示","tags":["React"],"categories":null,"date":"Mon, 30 Aug 2021 17:03:30 GMT","updated":"Sun, 09 Jul 2023 13:36:23 GMT","coverImg":null,"dateYMD":"2021-08-30","wordcount":"本文字数：140 字    阅读完需：约 1 分钟"},{"id":"article-29","markdown":"## 安装\n``` javascript\n// npm安装\nnpm install --save vue-croppa\n// yarn 安装\nyarn add vue-croppa\n```\n## 使用\n\u003e 引入插件\n\n两种引用方式\n``` javascript\n// 全局注册 main.js\nimport VueCropper from 'vue-cropper'\nVue.use(VueCropper)\n \n// 组件内单独使用 userAvatar.vue\nimport { VueCropper } from 'vue-cropper'\n```\n\n\u003e 上传按钮\n\n自定义样式的一个头像上传按钮，可以按需要修改\n```javascript\n// editCropper() 打开上传模态框\n\u003cdiv class=\"user-info-head\" @click=\"editCropper()\"\u003e\u003cimg v-bind:src=\"options.img\" title=\"点击上传头像\" class=\"img-circle img-lg\" /\u003e\u003c/div\u003e\n```\n效果：\n![image.png](/public/images/vue/croppa01.png)\n\n\u003e 剪裁图片弹框\n\n根据项目需要添加了自定义样式，可以按需要修改\n``` html\n\u003cel-dialog :title=\"title\" :visible.sync=\"open\" width=\"800px\" append-to-body @opened=\"modalOpened\"  @close=\"closeDialog()\"\u003e\n      \u003cel-row\u003e\n        \u003cel-col :xs=\"24\" :md=\"12\" :style=\"{height: '350px'}\"\u003e\n          \u003cvue-cropper\n            ref=\"cropper\"\n            :img=\"options.img\"\n            :info=\"true\"\n            :autoCrop=\"options.autoCrop\"\n            :autoCropWidth=\"options.autoCropWidth\"\n            :autoCropHeight=\"options.autoCropHeight\"\n            :fixedBox=\"options.fixedBox\"\n            @realTime=\"realTime\"\n            v-if=\"visible\"\n          /\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :xs=\"24\" :md=\"12\" :style=\"{height: '350px'}\"\u003e\n          \u003cdiv class=\"avatar-upload-preview\"\u003e\n            \u003cimg :src=\"previews.url\" :style=\"previews.img\" /\u003e\n          \u003c/div\u003e\n        \u003c/el-col\u003e\n      \u003c/el-row\u003e\n      \u003cbr /\u003e\n      \u003cel-row\u003e\n        \u003cel-col :lg=\"2\" :md=\"2\"\u003e\n          \u003cel-upload action=\"#\" :http-request=\"requestUpload\" :show-file-list=\"false\" :before-upload=\"beforeUpload\"\u003e\n            \u003cel-button size=\"small\"\u003e\n              选择\n              \u003ci class=\"el-icon-upload el-icon--right\"\u003e\u003c/i\u003e\n            \u003c/el-button\u003e\n          \u003c/el-upload\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :lg=\"{span: 1, offset: 2}\" :md=\"2\"\u003e\n          \u003cel-button icon=\"el-icon-plus\" size=\"small\" @click=\"changeScale(1)\"\u003e\u003c/el-button\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :lg=\"{span: 1, offset: 1}\" :md=\"2\"\u003e\n          \u003cel-button icon=\"el-icon-minus\" size=\"small\" @click=\"changeScale(-1)\"\u003e\u003c/el-button\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :lg=\"{span: 1, offset: 1}\" :md=\"2\"\u003e\n          \u003cel-button icon=\"el-icon-refresh-left\" size=\"small\" @click=\"rotateLeft()\"\u003e\u003c/el-button\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :lg=\"{span: 1, offset: 1}\" :md=\"2\"\u003e\n          \u003cel-button icon=\"el-icon-refresh-right\" size=\"small\" @click=\"rotateRight()\"\u003e\u003c/el-button\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :lg=\"{span: 2, offset: 6}\" :md=\"2\"\u003e\n          \u003cel-button type=\"primary\" size=\"small\" @click=\"uploadImg()\"\u003e提 交\u003c/el-button\u003e\n        \u003c/el-col\u003e\n      \u003c/el-row\u003e\n    \u003c/el-dialog\u003e\n\n```\n效果：\n![image.png](/public/images/vue/croppa02.png)\n\n下面是完整代码，包含css及上传api接口\n``` html\n\u003ctemplate\u003e\n  \u003cdiv\u003e\n    \u003cdiv class=\"user-info-head\" @click=\"editCropper()\"\u003e\u003cimg v-bind:src=\"options.img\" title=\"点击上传头像\" class=\"img-circle img-lg\" /\u003e\u003c/div\u003e\n    \u003cel-dialog :title=\"title\" :visible.sync=\"open\" width=\"800px\" append-to-body @opened=\"modalOpened\"  @close=\"closeDialog()\"\u003e\n      \u003cel-row\u003e\n        \u003cel-col :xs=\"24\" :md=\"12\" :style=\"{height: '350px'}\"\u003e\n          \u003cvue-cropper\n            ref=\"cropper\"\n            :img=\"options.img\"\n            :info=\"true\"\n            :autoCrop=\"options.autoCrop\"\n            :autoCropWidth=\"options.autoCropWidth\"\n            :autoCropHeight=\"options.autoCropHeight\"\n            :fixedBox=\"options.fixedBox\"\n            @realTime=\"realTime\"\n            v-if=\"visible\"\n          /\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :xs=\"24\" :md=\"12\" :style=\"{height: '350px'}\"\u003e\n          \u003cdiv class=\"avatar-upload-preview\"\u003e\n            \u003cimg :src=\"previews.url\" :style=\"previews.img\" /\u003e\n          \u003c/div\u003e\n        \u003c/el-col\u003e\n      \u003c/el-row\u003e\n      \u003cbr /\u003e\n      \u003cel-row\u003e\n        \u003cel-col :lg=\"2\" :md=\"2\"\u003e\n          \u003cel-upload action=\"#\" :http-request=\"requestUpload\" :show-file-list=\"false\" :before-upload=\"beforeUpload\"\u003e\n            \u003cel-button size=\"small\"\u003e\n              选择\n              \u003ci class=\"el-icon-upload el-icon--right\"\u003e\u003c/i\u003e\n            \u003c/el-button\u003e\n          \u003c/el-upload\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :lg=\"{span: 1, offset: 2}\" :md=\"2\"\u003e\n          \u003cel-button icon=\"el-icon-plus\" size=\"small\" @click=\"changeScale(1)\"\u003e\u003c/el-button\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :lg=\"{span: 1, offset: 1}\" :md=\"2\"\u003e\n          \u003cel-button icon=\"el-icon-minus\" size=\"small\" @click=\"changeScale(-1)\"\u003e\u003c/el-button\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :lg=\"{span: 1, offset: 1}\" :md=\"2\"\u003e\n          \u003cel-button icon=\"el-icon-refresh-left\" size=\"small\" @click=\"rotateLeft()\"\u003e\u003c/el-button\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :lg=\"{span: 1, offset: 1}\" :md=\"2\"\u003e\n          \u003cel-button icon=\"el-icon-refresh-right\" size=\"small\" @click=\"rotateRight()\"\u003e\u003c/el-button\u003e\n        \u003c/el-col\u003e\n        \u003cel-col :lg=\"{span: 2, offset: 6}\" :md=\"2\"\u003e\n          \u003cel-button type=\"primary\" size=\"small\" @click=\"uploadImg()\"\u003e提 交\u003c/el-button\u003e\n        \u003c/el-col\u003e\n      \u003c/el-row\u003e\n    \u003c/el-dialog\u003e\n  \u003c/div\u003e\n\u003c/template\u003e\n\n\u003cscript\u003e\nimport store from '@/store'\nimport { VueCropper } from 'vue-cropper'\nimport { postUploadImg } from '@/api/common' //  封装的上传api接口\n\nexport default {\n  components: { VueCropper },\n  props: {\n    user: {\n      type: Object\n    }\n  },\n  data () {\n    return {\n      // 是否显示弹出层\n      open: false,\n      // 是否显示cropper\n      visible: false,\n      // 弹出层标题\n      title: '修改头像',\n      options: {\n        img: '', // 裁剪图片的地址\n        info: true, // 裁剪框的大小信息\n        outputSize: 0.8, // 裁剪生成图片的质量\n        outputType: 'jpeg', // 裁剪生成图片的格式\n        canScale: false, // 图片是否允许滚轮缩放\n        autoCrop: true, // 是否默认生成截图框\n        // autoCropWidth: 300, // 默认生成截图框宽度\n        // autoCropHeight: 200, // 默认生成截图框高度\n        fixedBox: true, // 固定截图框大小 不允许改变\n        fixed: true, // 是否开启截图框宽高固定比例\n        fixedNumber: [7, 5], // 截图框的宽高比例\n        full: true, // 是否输出原图比例的截图\n        canMoveBox: false, // 截图框能否拖动\n        original: false, // 上传图片按照原始比例渲染\n        centerBox: false, // 截图框是否被限制在图片里面\n        infoTrue: true // true 为展示真实输出图片宽高 false 展示看到的截图框宽高\n      },\n      previews: {}\n    }\n  },\n  mounted () {\n    console.log(this.user)\n  },\n  methods: {\n    // 编辑头像\n    editCropper () {\n      this.open = true\n    },\n    // 打开弹出层结束时的回调\n    modalOpened () {\n      this.visible = true\n    },\n    // 覆盖默认的上传行为\n    requestUpload () {\n    },\n    // 向左旋转\n    rotateLeft () {\n      this.$refs.cropper.rotateLeft()\n    },\n    // 向右旋转\n    rotateRight () {\n      this.$refs.cropper.rotateRight()\n    },\n    // 图片缩放\n    changeScale (num) {\n      num = num || 1\n      this.$refs.cropper.changeScale(num)\n    },\n    // 上传预处理\n    beforeUpload (file) {\n      if (file.type.indexOf('image/') === -1) {\n        this.msgError('文件格式错误，请上传图片类型,如：JPG，PNG后缀的文件。')\n      } else {\n        const reader = new FileReader()\n        reader.readAsDataURL(file)\n        reader.onload = () =\u003e {\n          this.options.img = reader.result\n        }\n      }\n    },\n    // 上传图片\n    uploadImg () {\n      this.$refs.cropper.getCropBlob(data =\u003e {\n        const formData = new FormData()\n        formData.append('file', data)\n\t// postUploadImg 封装的上传api接口\n        postUploadImg(formData).then(async (response) =\u003e {\n          this.open = false\n          this.options.img = response.url // 绑定接口返回url\n          this.visible = false\n        })\n      })\n    },\n    // 实时预览\n    realTime (data) {\n      this.previews = data\n    },\n    // 关闭窗口\n    closeDialog () {\n      this.visible = false\n    }\n  }\n}\n\u003c/script\u003e\n\u003cstyle scoped lang=\"scss\"\u003e\n.user-info-head {\n  position: relative;\n  display: inline-block;\n  height: 120px;\n}\n\n.user-info-head:hover:after {\n  content: '+';\n  position: absolute;\n  left: 0;\n  right: 0;\n  top: 0;\n  bottom: 0;\n  color: #eee;\n  background: rgba(0, 0, 0, 0.5);\n  font-size: 24px;\n  font-style: normal;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  cursor: pointer;\n  line-height: 110px;\n  border-radius: 50%;\n}\n.img-circle {\n  border-radius: 50%;\n}\n\n.img-lg {\n  width: 120px;\n  height: 120px;\n}\n.avatar-upload-preview {\n  position: absolute;\n  top: 50%;\n  transform: translate(50%, -50%);\n  width: 200px;\n  height: 200px;\n  border-radius: 50%;\n  box-shadow: 0 0 4px #ccc;\n  overflow: hidden;\n}\n\u003c/style\u003e\n\n\n```\n\n\n","title":"基于vue的图片剪裁工具vue-croppe","summary":null,"tags":["vue"],"categories":null,"date":"Tue, 24 Aug 2021 11:36:51 GMT","updated":"Sun, 09 Jul 2023 13:48:27 GMT","coverImg":null,"dateYMD":"2021-08-24","wordcount":"本文字数：860 字    阅读完需：约 5 分钟"},{"id":"article-28","markdown":"在项目过程中，我们常常需要获取IP的所在地。而这一功能一般都是通过一些数据网站的对外接口来实现，这些接口一般情况下都是付费使用的。在这篇文章中我将记录，基于node.js的阿里云免费IP地址查询接口的使用。\n \u003e 百度地图开放平台找的你的ak\n\n\n### 创建应用,根据你的需要勾选服务\n地址：http://lbsyun.baidu.com/apiconsole/key\n![image.png](/public/images/node/baiduMap.png)\n\n### 创建完成后返回应用列表，获取到Ak\n\n![image.png](/public/images/node/baiduMap02.png)\n\n### 获取api \n地址：https://lbsyun.baidu.com/index.php?title=webapi/ip-api\n\n![image.png](/public/images/node/baiduMap03.png)\n\n\u003e 在node.js中配置：我使用express搭建的服务器\n``` js\n// 引入https\nconst https = require('https'),\n\n// 获取ip\nlet ip =  req.headers['x-forwarded-for'] 　||　req.headers['x-real-ip']  \nlet option = {\n     \thostname:\"api.map.baidu.com\",//接口域名\n        path:`/location/ip?ip=${ip}\u0026ak=${您的AK}`,//path格式\n        headers:{//设置请求头\n            \"Content-Type\":\"application/json; charset=utf-8\"\n        }\n};\n// ip信息\nconst ipInfo = {}\n// 请求接口\nconst post_req = await https.request(option, async (Res)=\u003e{\n     Res.setEncoding('utf8');\n     if(Res.statusCode===200){//若http状态码为200则请求成功\n          Res.on('data',async (data) =\u003e {\n\t\t// 解析返回信息\n               const {province , city} = JSON.parse(data).content.address_detail\n               ipInfo.userProvince= province //省份\n               ipInfo.userCity= city  // 城市\n               ipInfo.userIp = ip     // IP\n          });\n     }else{\n           // 报错，未查询位置\n     }\n})\npost_req.end();\n```\n\n","title":"node.js使用百度地图api根据ip获取用户ip所在地","summary":"在项目过程中，我们常常需要获取IP的所在地。而这一功能一般都是通过一些数据网站的对外接口来实现，这些接口一般情况下都是付费使用的。在这篇文章中我将记录，基于node.js的阿里云免费IP地址查询接口的使用。","tags":["node.js"],"categories":null,"date":"Tue, 24 Aug 2021 11:44:54 GMT","updated":"Sun, 09 Jul 2023 13:45:08 GMT","coverImg":null,"dateYMD":"2021-08-24","wordcount":"本文字数：140 字    阅读完需：约 1 分钟"},{"id":"article-27","markdown":"最近在做数据大屏时，想给盒子周围添加一圈流动的边框，加页面动态效果\n\n## html代码\n\n``` html\n\u003cdiv class=\"light-box\"\u003e\n\t\u003cspan class=\"light\"\u003e\u003c/span\u003e\n\t\u003cspan class=\"light\"\u003e\u003c/span\u003e\n\t\u003cspan class=\"light\"\u003e\u003c/span\u003e\n\t\u003cspan class=\"light\"\u003e\u003c/span\u003e\n\u003c/div\u003e\n```\n\n## css代码\n\n```css\n.light-box {position: absolute;}\n.light {\n      position: absolute;\n      display: block;\n    }\n    .light:nth-child(1) {\n      filter: hue-rotate(0deg);\n      top: 0;\n      left: 0;\n      width: 100%;\n      height: 3px;\n      background: linear-gradient(90deg, transparent, #3a86ff);\n      animation: animate1 8s linear infinite;\n    }\n\n    @keyframes animate1 {\n      0% {\n        left: -100%;\n      }\n\n      50%,\n      100% {\n        left: 100%;\n      }\n    }\n    .light:nth-child(2) {\n      filter: hue-rotate(60deg);\n      top: -100%;\n      right: 0;\n      width: 3px;\n      height: 100%;\n      background: linear-gradient(180deg, transparent, #3a86ff);\n      animation: animate2 8s linear infinite;\n      animation-delay: 2s;\n    }\n\n    @keyframes animate2 {\n      0% {\n        top: -100%;\n      }\n\n      50%,\n      100% {\n        top: 100%;\n      }\n    }\n    .light:nth-child(3) {\n      filter: hue-rotate(120deg);\n      bottom: 0;\n      right: 0;\n      width: 100%;\n      background: linear-gradient(270deg, transparent, #3a86ff);\n      animation: animate3 8s linear infinite;\n      animation-delay: 4s;\n    }\n\n    @keyframes animate3 {\n      0% {\n        right: -100%;\n        height: 3px;\n      }\n\n      50%,\n      100% {\n        height: 2px;\n        right: 100%;\n      }\n    }\n    .light:nth-child(4) {\n      filter: hue-rotate(300deg);\n      bottom: -100%;\n      left: 0;\n      width: 3px;\n      height: 100%;\n      background: linear-gradient(360deg, transparent, #3a86ff);\n      animation: animate4 8s linear infinite;\n      animation-delay: 6s;\n    }\n\n    @keyframes animate4 {\n      0% {\n        bottom: -100%;\n      }\n\n      50%,\n      100% {\n        bottom: 100%;x\n      }\n    }\n\n```\n","title":"css实现盒子边框流动动画效果","summary":"盒子周围添加一圈流动的边框，加页面动态效果","tags":["css"],"categories":null,"date":"Tue, 24 Aug 2021 13:49:25 GMT","updated":"Sun, 09 Jul 2023 13:42:53 GMT","coverImg":null,"dateYMD":"2021-08-24","wordcount":"本文字数：200 字    阅读完需：约 1 分钟"},{"id":"article-26","markdown":"node.js使用request请求第三方，有时返回的数据是gzip压缩过的，拿到的内容打印是一堆乱码。\n其他语言一般都是默认处理gzip，但是node没有处理，所以需要我们显式声明处理gzip，加上gzip:true即可，代码：\n\n``` js\n// 根据地址获取获取天气,url可替换你需要请求的接口\nlet url = `http://wthrcdn.etouch.cn/weather_mini?city=${encodeURI(city)}`\nrequest({\n\turl: url,\n\tgzip: true // 在线返回数据是gzip压缩过的\n}, async (error, response, body) =\u003e {\n\tif (!error \u0026\u0026 response.statusCode == 200) {\n\t\tresolve(JSON.parse(body).data)\n\t}\n}) \n```\n","title":"node.js解决请求第三方api时request返回gzip乱码","summary":null,"tags":["node.js"],"categories":null,"date":"Tue, 24 Aug 2021 13:58:59 GMT","updated":"Sun, 09 Jul 2023 13:41:49 GMT","coverImg":null,"dateYMD":"2021-08-24","wordcount":"本文字数：50 字    阅读完需：约 1 分钟"},{"id":"article-30","markdown":"主要记录一下，公司已经在使用的pc后台管理兼容ipad端使用，开发技术Vue、Element，主要是以下几个问题：\n- 金额输入框金额校验、ipad弹出键盘可输入任意字符（input的type=Number无效）\n- 下拉框el-select在ipad上点击下拉框区域展开与隐藏无效\n- ipad点击事件第一次无效，必须点击两次\n#### 一、金额输入框金额校验、ipad弹出键盘可输入任意字符（input的type=Number无效）\n将input的type类型设置为Number，在PC端\u0026手机端输入时仅能输入数字类型，但是在iPad上单击输入框弹出的是全键盘，可以切换中英文输入包括标点符号，而切触发input的onBlur和onChange事件时，获取不到value值。在网上看了许多解决方案，基本有以下几种：\n1. 使用原生input，设置属性（pattern=\"[0-9]*\"）| 测试后发现在ipad上没有效果\n\n``` html\n\u003cinput type=\"number\" pattern=\"[0-9]*\"  placeholder=\"请输入...\" /\u003e\n```\n\n1. 在input框的value值加正则校验\n   通过正则能保证不输入非数字，但是用户打开的是26键键盘，需要再切换到数字键盘，没有采用此方法\n\n``` html\n\u003cinput type=\"text\" id=\"class_rate_percent\" class=\"wsinput\" value=\"\" onkeyup=\"value=value.replace(/[^\\d.]/g,'')\"/\u003e\n``` \n\n最后发现将input的type设置为tel，既能保证用户只能输入数字还能输入小数，而且通过正则完成对输入金额的校验，具体实现代码在下面展示：\n\u003e html\n``` html\n\u003cel-input  \n\tsuffix-icon=\"el-icon-edit\"\n\ttype='tel'\n\tv-model=\"contractInfo.money\"\n\t@input=\"numberChange\"  //在 Input 值改变时触发\n\t@change=\"numberChange\" // 仅在输入框失去焦点或用户按下回车时触发\n\u003e \u003c/el-input\u003e\n```\n\u003e javascript\n``` js\n// input框发生改变，检查类型\u0026值的范围\n    numberChange (event,value) {\n      // var keyValue = event ? event.target.value : value\n      var keyValue = event\n      console.log(keyValue);\n      //先把非数字的都替换掉，除了数字和.\n      keyValue =keyValue.replace(/[^\\d.]/g,\"\");\n      //保证只有出现一个.而没有多个.\n      keyValue = keyValue.replace(/\\0.{2,}/g,\".\");\n      //保证.只出现一次，而不能出现两次以上\n      keyValue =keyValue.replace(\".\",\"$#$\").replace(/\\./g,\"\").replace(\"$#$\",\".\");\n      //保证.后只出现2位\n      keyValue =keyValue.replace(/([0-9]+\\.[0-9]{2})[0-9]*/,\"$1\");\n      let integer = /^[+]{0,1}(\\d+)$|^[+]{0,1}(\\d+\\.\\d+)$/;  \n      if (integer.test(keyValue) \u0026\u0026 keyValue \u003e this.maximum) {\n          this.$message({\n            showClose: true,\n            message: '输入金额不可以大于应付金额！',\n            type: 'warning'\n          });\n          let newVal =Math.min(keyValue, this.maximum);\n          this.contractInfo.money = newVal;\n      }else{\n          this.contractInfo.money = keyValue\n      }\n    },\n```\n### 二、下拉框el-select在ipad上点击下拉框区域展开与隐藏无效\nel-select下拉框在ipad上操作时输入框会获取到焦点，所以下拉框的展开与隐藏必须通过右侧icon图标进行操控，即使点击空白区域也无法控制下拉框，这样会给用户带来很不好的体验\n可以通过事件visible-change（下拉框出现/隐藏时触发）控制下拉框失焦,详细代码如下\n``` html\n\u003cel-select v-model=\"contractInfo.feetype\" placeholder=\"请选择\" ref='typeSel' @visible-change='handleTypeChange'\u003e\n\t\u003cel-option\n\t\tv-for=\"(item,index) in typeOptions\"\n\t\t:key=\"index\"\n\t\t:label=\"item.dicValue\"\n\t\t:value=\"item.dicValue\"\u003e\n\t\u003c/el-option\u003e\n\u003c/el-select\u003e\n```\n\n// javascript\n// 兼容ios端，用户点击后失焦问题\n   handleTypeChange(){\n      this.$refs['typeSel'].$refs.reference.$refs.input.blur()\n   },\n\n### 三、ipad点击事件第一次无效，必须点击两次\ntable表格中for循环，操作栏需要有点击事件，在pc端可正常操作，但是ipad需要点击两次才能触发click事件\n``` html\n\u003cel-table-column prop=\"statusText\" label=\"操作\" width=\"180px\" style=\"text-align:left\"\u003e\n\t\u003ctemplate slot-scope=\"scope\" \u003e\n\t\t\u003cspan  @click=\"handleAddCharge(scope.row)\" class=\"textBtn\" \u003e 添加收费 \u003c/span\u003e\n\t\u003c/template\u003e\n\u003c/el-table-column\u003e\n```\n解决办法：在事件后面可以加debounce过滤器,最终代码如下\n``` html\n\u003cel-table-column prop=\"statusText\" label=\"操作\" width=\"180px\" style=\"text-align:left\"\u003e\n\t\u003ctemplate slot-scope=\"scope\" \u003e\n\t\t\u003cspan  @click=\"handleAddCharge(scope.row)  | debounce\" class=\"textBtn\" \u003e 添加收费 \u003c/span\u003e\n\t\u003c/template\u003e\n\u003c/el-table-column\u003e\n```\n未完待续...","title":"ipad使用Vue\u0026Element的产生的Bug","summary":null,"tags":["Vue","Element-ui","ios"],"categories":null,"date":"Mon, 23 Aug 2021 12:35:58 GMT","updated":"Sun, 09 Jul 2023 13:51:58 GMT","coverImg":null,"dateYMD":"2021-08-23","wordcount":"本文字数：300 字    阅读完需：约 2 分钟"}]},"__N_SSG":true},"page":"/","query":{},"buildId":"cuZce-tCUs9C6L25idFvY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></div></body></html>
